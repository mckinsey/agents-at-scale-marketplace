# ──────────────────────────────────────────────────────────────────────────────
# Company Lookup Agent using GPT-5 with web_search_preview and structured output.
#
# Given a company name, the agent searches the web and returns a structured
# JSON response containing:
#   - company_name        — official registered name
#   - website_url         — primary website
#   - companies_house_number — UK Companies House registration number (if available)
#   - registered_address  — official registered address
#   - company_status      — e.g. "Active", "Dissolved"
#
# Structured output is enforced via the output-schema annotation, which constrains
# the model response to a JSON object matching the schema — no prompt engineering needed.
# ──────────────────────────────────────────────────────────────────────────────

# 1. Model CR (shared with other gpt-5 examples — skip if already applied)
apiVersion: ark.mckinsey.com/v1alpha1
kind: Model
metadata:
  name: openai-gpt-5-nano
spec:
  provider: openai
  type: completions
  model:
    value: gpt-5-nano-2025-08-07
  config:
    openai:
      apiKey:
        valueFrom:
          secretKeyRef:
            name: openai-credentials
            key: api-key
      baseUrl:
        valueFrom:
          secretKeyRef:
            name: openai-credentials
            key: base-url
---
# 2. Agent CR
apiVersion: ark.mckinsey.com/v1alpha1
kind: Agent
metadata:
  name: company-lookup-agent
  annotations:
    executor-openai-responses.ark.mckinsey.com/reasoning: '{"effort": "low"}'
    executor-openai-responses.ark.mckinsey.com/tools: |
      [{"type": "web_search_preview"}]
    executor-openai-responses.ark.mckinsey.com/output-schema: |
      {
        "type": "object",
        "properties": {
          "company_name": {
            "type": "string",
            "description": "Official registered company name"
          },
          "website_url": {
            "type": "string",
            "description": "Primary company website URL"
          },
          "companies_house_number": {
            "type": "string",
            "description": "UK Companies House registration number, or null if not a UK company"
          },
          "registered_address": {
            "type": "string",
            "description": "Official registered address of the company"
          },
          "company_status": {
            "type": "string",
            "description": "Current company status, e.g. Active, Dissolved, In Administration"
          }
        },
        "required": ["company_name", "website_url", "companies_house_number", "registered_address", "company_status"],
        "additionalProperties": false
      }
spec:
  modelRef:
    name: openai-gpt-5-nano
  executionEngine:
    name: executor-openai-responses
  prompt: |
    You are a company research assistant. Given a company name, search the web to
    find accurate, up-to-date information about the company and return it as structured data.

    Always search for:
    1. The official registered company name
    2. The primary website URL
    3. The UK Companies House registration number (if it is a UK-registered company)
    4. The official registered address
    5. The current company status (Active, Dissolved, etc.)

    If any field cannot be found, return null for that field. Always use web search
    to verify the information rather than relying on training data alone.
---
# 3. Query CR
apiVersion: ark.mckinsey.com/v1alpha1
kind: Query
metadata:
  name: company-lookup-query
spec:
  target:
    type: agent
    name: company-lookup-agent
  input: "Look up McKinsey & Company"
