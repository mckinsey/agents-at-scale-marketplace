# ──────────────────────────────────────────────────────────────────────────────
# Companies House Agent — MCP tool example.
#
# Demonstrates how to wire an MCPServer's tools into an agent running on the
# OpenAI Responses executor. The companies-house MCP exposes two tools:
#
#   mcp-companies-house-get-uk-company-number   — look up a company by name
#   mcp-companies-house-get-uk-person-in-control — list persons with significant control
#
# MCP tools are referenced in spec.tools as type: custom with the name prefix
# mcp-<server-name>-<tool-name> (auto-generated by Ark when the MCPServer CR
# is registered).
#
# Prerequisites:
#   ark install marketplace/mcps/companies-house-mcp
#   — or —
#   cd mcps/companies-house-mcp && devspace dev
# ──────────────────────────────────────────────────────────────────────────────

# 1. Model CR (shared with other gpt-5 examples — skip if already applied)
apiVersion: ark.mckinsey.com/v1alpha1
kind: Model
metadata:
  name: openai-gpt-5-nano
spec:
  provider: openai
  type: completions
  model:
    value: gpt-5.2-2025-12-11
  config:
    openai:
      apiKey:
        valueFrom:
          secretKeyRef:
            name: openai-credentials
            key: api-key
      baseUrl:
        valueFrom:
          secretKeyRef:
            name: openai-credentials
            key: base-url
---
# 2. Agent CR
#    spec.tools   → MCP tools surfaced by the companies-house MCPServer CR
#    annotation   → reasoning config for gpt-5
apiVersion: ark.mckinsey.com/v1alpha1
kind: Agent
metadata:
  name: companies-house-agent
  annotations:
    executor-openai-responses.ark.mckinsey.com/reasoning: '{"effort": "low"}'
spec:
  modelRef:
    name: openai-gpt-5-nano
  executionEngine:
    name: executor-openai-responses
  tools:
    - type: custom
      name: mcp-companies-house-get-uk-company-number
    - type: custom
      name: mcp-companies-house-get-uk-person-in-control
  prompt: |
    You are a UK company research assistant with access to the official Companies House API.
    Use the available tools to look up company registration numbers and persons with
    significant control. Always use the tools to retrieve live data rather than relying
    on training knowledge.
---
# 3. Query CR
apiVersion: ark.mckinsey.com/v1alpha1
kind: Query
metadata:
  name: companies-house-query
spec:
  target:
    type: agent
    name: companies-house-agent
  input: "Find the company number and persons with significant control for ADAM GROOMING BN LTD"
