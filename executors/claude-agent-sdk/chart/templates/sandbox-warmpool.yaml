{{- if and .Values.scheduler.enabled .Values.scheduler.warmPool.enabled }}
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxWarmPool
metadata:
  name: {{ .Values.scheduler.config.sandboxTemplate }}-warm
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.app.name }}
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  sandboxTemplateRef:
    name: {{ .Values.scheduler.config.sandboxTemplate }}
  replicas: {{ .Values.scheduler.warmPool.replicas }}
{{- end }}
