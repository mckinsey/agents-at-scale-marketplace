{{- if .Values.scheduler.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.app.name }}-sandbox-sa
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.app.name }}-sandbox
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.app.name }}-sandbox-ark-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.app.name }}-sandbox
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
rules:
  - apiGroups: ["ark.mckinsey.com"]
    resources: ["queries", "agents", "models", "tools", "mcpservers", "executionengines"]
    verbs: ["get"]
  # Namespace-wide secret access is required because Model CRD API keys reference
  # dynamically-named secrets. Cannot scope with resourceNames since secret names
  # are not known at deploy time. Container-level sandbox isolation mitigates the
  # blast radius — each sandbox runs in its own pod with its own service account.
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "services"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.app.name }}-sandbox-ark-reader
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.app.name }}-sandbox
  annotations:
    {{- with .Values.global.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.app.name }}-sandbox-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Values.app.name }}-sandbox-ark-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
