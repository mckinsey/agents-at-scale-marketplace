name: Charts CI/CD (Reusable)

on:
  workflow_call:
    inputs:
      chart-name:
        description: "Name of the chart to validate"
        type: string
        required: true
      chart-path:
        description: "Path to the chart directory"
        type: string
        required: true
      chart-namespace:
        description: "Kubernetes namespace for the chart"
        type: string
        required: true
      upload-artifact:
        description: "Upload packaged chart as GitHub Actions artifact"
        type: boolean
        default: false
      deploy-to-registry:
        description: "Deploy chart to container registry (GHCR)"
        type: boolean
        default: false
      run-deployment-test:
        description: "Run Kubernetes deployment test"
        type: boolean
        default: false
      release-tag:
        description: "The git tag of the release to attach the chart to"
        type: string
        required: false

jobs:
  test-deployment:
    name: Test Deployment - ${{ inputs.chart-name }}
    runs-on: ubuntu-24.04
    if: ${{ inputs.run-deployment-test }}
    defaults:
      run:
        working-directory: ${{ inputs.chart-path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kind (Kubernetes in Docker)
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ inputs.chart-name }}-test
          kubectl_version: v1.29.0

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Install DevSpace
        run: npm install -g devspace

      - name: Create required namespaces
        run: |
          kubectl create namespace ark-system || true
          kubectl create namespace ${{ inputs.chart-namespace }} || true

      - name: Add Helm Repositories - ${{ inputs.chart-name }}
        run: |
          # Extract and add all helm repositories from Chart.yaml dependencies
          if [ -f chart/Chart.yaml ]; then
            yq eval '.dependencies[].repository | select(. != null)' chart/Chart.yaml | sort -u | while read -r repo; do
              if [[ $repo == http* ]]; then
                repo_name=$(echo "$repo" | sed 's|https\?://||' | sed 's|[/.]|-|g')
                echo "Adding repository: $repo as $repo_name"
                helm repo add "$repo_name" "$repo" || true
              fi
            done
            
            # Only update if repositories were actually added
            if helm repo list &> /dev/null && [ "$(helm repo list -o json | jq length)" -gt 0 ]; then
              echo "Updating Helm repositories..."
              helm repo update
            else
              echo "No Helm repositories to update (chart may use OCI registries)"
            fi
          fi

      - name: Test Helm Installation
        run: |
          helm dependency update chart/
          helm install ${{ inputs.chart-name }}-test chart/ \
            --namespace ${{ inputs.chart-namespace }} \
            --wait \
            --timeout 5m

      - name: Verify Deployment
        run: |
          kubectl get pods -n ${{ inputs.chart-namespace }}
          kubectl get svc -n ${{ inputs.chart-namespace }}
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/instance=${{ inputs.chart-name }}-test -n ${{ inputs.chart-namespace }} --timeout=300s

      - name: Verify Marketplace Label on Deployment
        run: |
          echo "Verifying marketplace label is applied to deployment..."

          # Check if deployment has the marketplace label
          DEPLOYMENTS=$(kubectl get deployments -n ${{ inputs.chart-namespace }} -l ark.mckinsey.com/marketplace-item=${{ inputs.chart-name }} -o name)

          if [ -z "$DEPLOYMENTS" ]; then
            echo "ERROR: No deployments found with label ark.mckinsey.com/marketplace-item=${{ inputs.chart-name }}"
            echo ""
            echo "Current deployments in namespace:"
            kubectl get deployments -n ${{ inputs.chart-namespace }} -o custom-columns=NAME:.metadata.name,LABELS:.metadata.labels
            echo ""
            echo "The marketplace label is required for installation status detection in the ARK dashboard."
            echo ""
            echo "To fix this, you have two options:"
            echo ""
            echo "1. Use the ark-marketplace-common library chart (recommended for external OCI charts):"
            echo "   See: charts/ark-marketplace-common/README.md"
            echo ""
            echo "2. Add labels directly to your deployment templates:"
            echo "   In templates/_helpers.tpl, ensure your labels include:"
            echo "   {{- with .Values.global.labels }}"
            echo "   {{ toYaml . }}"
            echo "   {{- end }}"
            echo ""
            exit 1
          else
            echo "✓ Marketplace label successfully applied to deployment(s):"
            echo "$DEPLOYMENTS"

            # Verify label value matches chart name
            for deployment in $DEPLOYMENTS; do
              LABEL_VALUE=$(kubectl get "$deployment" -n ${{ inputs.chart-namespace }} -o jsonpath='{.metadata.labels.ark\.mckinsey\.com/marketplace-item}')
              if [ "$LABEL_VALUE" != "${{ inputs.chart-name }}" ]; then
                echo "ERROR: Label value '$LABEL_VALUE' does not match expected chart name '${{ inputs.chart-name }}'"
                echo "The label value must match the 'name' field in marketplace.json"
                exit 1
              fi
            done
            echo "✓ Label value verification passed"
          fi

      - name: Cleanup
        if: always()
        run: |
          helm uninstall ${{ inputs.chart-name }}-test -n ${{ inputs.chart-namespace }} || true
          kubectl delete namespace ${{ inputs.chart-namespace }} || true

  validate-chart:
    name: Validate Chart - ${{ inputs.chart-name }}
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ inputs.chart-path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Install DevSpace via npm
        run: npm install -g devspace

      - name: Add Helm Repositories - ${{ inputs.chart-name }}
        run: |
          # Extract and add all helm repositories from Chart.yaml dependencies
          if [ -f chart/Chart.yaml ]; then
            yq eval '.dependencies[].repository | select(. != null)' chart/Chart.yaml | sort -u | while read -r repo; do
              if [[ $repo == http* ]]; then
                repo_name=$(echo "$repo" | sed 's|https\?://||' | sed 's|[/.]|-|g')
                echo "Adding repository: $repo as $repo_name"
                helm repo add "$repo_name" "$repo" || true
              fi
            done
            
            # Only update if repositories were actually added
            if helm repo list &> /dev/null && [ "$(helm repo list -o json | jq length)" -gt 0 ]; then
              echo "Updating Helm repositories..."
              helm repo update
            else
              echo "No Helm repositories to update (chart may use OCI registries)"
            fi
          fi

      - name: Validate Helm Chart Dependencies - ${{ inputs.chart-name }}
        run: |
          helm dependency update chart/
          helm dependency build chart/

      - name: Lint Helm Chart - ${{ inputs.chart-name }}
        run: |
          helm lint chart/

      - name: Validate Marketplace Label - ${{ inputs.chart-name }}
        run: |
          echo "Validating marketplace label in values.yaml..."

          # Check if values.yaml exists
          if [ ! -f chart/values.yaml ]; then
            echo "ERROR: chart/values.yaml not found"
            exit 1
          fi

          # Check if marketplace label exists in global.labels
          if ! yq eval '.global.labels."ark.mckinsey.com/marketplace-item"' chart/values.yaml | grep -q .; then
            echo "ERROR: Missing required marketplace label in chart/values.yaml"
            echo "Please add the following to your values.yaml:"
            echo ""
            echo "global:"
            echo "  labels:"
            echo "    ark.mckinsey.com/marketplace-item: \"${{ inputs.chart-name }}\""
            echo ""
            exit 1
          fi

          # Get the label value
          LABEL_VALUE=$(yq eval '.global.labels."ark.mckinsey.com/marketplace-item"' chart/values.yaml)

          # Check if label value matches chart name
          if [ "$LABEL_VALUE" != "${{ inputs.chart-name }}" ]; then
            echo "WARNING: Marketplace label value '$LABEL_VALUE' does not match chart name '${{ inputs.chart-name }}'"
            echo "This may cause installation detection issues in the ARK dashboard."
            echo "Label value should match the 'name' field in marketplace.json"
          else
            echo "✓ Marketplace label validation passed: $LABEL_VALUE"
          fi

      - name: Package Helm Chart - ${{ inputs.chart-name }}
        run: |
          helm package chart/

      - name: Validate Helm Template Rendering - ${{ inputs.chart-name }}
        run: |
          helm template ${{ inputs.chart-name }} chart/ \
            --namespace ${{ inputs.chart-namespace }} \
            --debug \
            --dry-run

      - name: Upload Helm Chart - ${{ inputs.chart-name }}
        if: ${{ inputs.upload-artifact || inputs.deploy-to-registry }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.chart-name }}-${{ github.sha }}
          path: ${{ inputs.chart-path }}/${{ inputs.chart-name }}-*.tgz
          retention-days: 30

      - name: Validate DevSpace Configuration - ${{ inputs.chart-name }}
        run: |
          devspace print

      - name: Check DevSpace Config Syntax - ${{ inputs.chart-name }}
        run: |
          devspace list profiles

  attach-chart-to-release:
    name: Attach Chart to Release - ${{ inputs.chart-name }}
    runs-on: ubuntu-24.04
    needs: validate-chart
    if: ${{ inputs.release-tag != '' }}
    defaults:
      run:
        working-directory: ${{ inputs.chart-path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Chart Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.chart-name }}-${{ github.sha }}
          path: ${{ inputs.chart-path }}

      - name: Upload Chart to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${{ inputs.release-tag }}"
          CHART_FILE=$(ls ${{ inputs.chart-name }}-*.tgz | head -n 1)
          
          echo "Uploading $CHART_FILE to release $RELEASE_TAG"
          gh release upload "$RELEASE_TAG" "$CHART_FILE" --clobber
          echo "✓ Chart attached to release: $RELEASE_TAG"

  deploy-chart:
    name: Deploy Chart to Registry - ${{ inputs.chart-name }}
    runs-on: ubuntu-24.04
    needs: validate-chart
    if: ${{ inputs.deploy-to-registry }}
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ${{ inputs.chart-path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Download Helm Chart Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.chart-name }}-${{ github.sha }}
          path: ${{ inputs.chart-path }}

      - name: Deploy Helm Chart to Container Registry - ${{ inputs.chart-name }}
        run: |
          echo "Deploying Helm chart to container registry..."
          REGISTRY="ghcr.io"
          CHART_REPO="${REGISTRY}/${{ github.repository_owner }}/$(echo '${{ github.repository }}' | cut -d'/' -f2)/charts"

          echo "User: ${{ github.actor }}"
          echo "Registry: $REGISTRY"
          echo "Chart Repository: $CHART_REPO"

          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "$REGISTRY" --username "${{ github.actor }}" --password-stdin

          CHART_FILE=$(ls ${{ inputs.chart-name }}-*.tgz | head -n 1)
          echo "Pushing chart: $CHART_FILE"

          helm push "$CHART_FILE" "oci://${CHART_REPO}"
          echo "✓ Helm chart deployed: $CHART_FILE to oci://${CHART_REPO}"
