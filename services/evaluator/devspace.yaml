# DevSpace configuration for evaluator
version: v2beta1

vars:
  HTTPROUTE_ENABLED:
    command: |-
      if kubectl get crd httproutes.gateway.networking.k8s.io >/dev/null 2>&1; then
        echo "true"
      else
        echo "false"
      fi

images:
  evaluator:
    image: evaluator
    dockerfile: Dockerfile
    context: .

pipelines:
  deploy: |-
    build_images --all
    create_deployments --all
  dev: |-
    build_images --all
    create_deployments --all
    start_dev --all

deployments:
  evaluator:
    namespace: default
    helm:
      chart:
        path: ./chart
      values:
        app:
          image:
            repository: ${runtime.images.evaluator.image}
            tag: ${runtime.images.evaluator.tag}
        httpRoute:
          enabled: ${HTTPROUTE_ENABLED}
        evaluatorCRD:
          enabled: true

dev:
  evaluator:
    imageSelector: evaluator
    namespace: default
    logs:
      lastLines: 50

hooks:
  - command: |-
      # Check if Gateway API HTTPRoute CRD exists
      if kubectl get crd httproutes.gateway.networking.k8s.io >/dev/null 2>&1; then
        echo "✓ Gateway API HTTPRoute CRD found - HTTPRoute will be created"
      else
        echo "✗ Gateway API HTTPRoute CRD not found - HTTPRoute will be skipped"
      fi

      # Check if Evaluator CRD exists
      if kubectl get crd evaluators.ark.mckinsey.com >/dev/null 2>&1; then
        echo "✓ Evaluator CRD found - Evaluator resource will be created"
      else
        echo "✗ Evaluator CRD not found - Evaluator resource will be skipped"
        echo "  Install Ark operator first for CRD-triggered evaluations"
      fi
    events: ["before:deploy:evaluator"]
  - command: |-
      echo ""
      echo "=== Evaluator Service Deployed ==="
      echo ""
      echo "Service: evaluator.default.svc.cluster.local:8000"
      echo ""
      echo "Port-forward: kubectl port-forward -n default svc/evaluator 8000:8000"
      echo ""
      echo "HTTPRoute: http://evaluator.default.127.0.0.1.nip.io:8080"
      echo ""
      echo "Health check:"
      echo "  curl http://localhost:8000/health"
      echo ""
      echo "Quick test:"
      echo "  curl -s -X POST http://localhost:8000/evaluate \\"
      echo "    -H 'Content-Type: application/json' \\"
      echo "    -d '{\"type\":\"direct\",\"config\":{\"input\":\"What is ML?\",\"output\":\"ML is machine learning.\"},\"parameters\":{\"provider\":\"ark\"}}'"
      echo ""
    events: ["after:deploy:evaluator"]
