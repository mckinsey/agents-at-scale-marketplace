apiVersion: ark.mckinsey.com/v1alpha1
kind: Evaluator
metadata:
  name: production-quality-evaluator
spec:
  address:
    valueFrom:
      serviceRef:
        name: ark-evaluator
        port: "http"
        path: "/evaluate"
  selector:
    resourceType: "Query"
    apiGroup: "ark.mckinsey.com"
    matchLabels:
      environment: "production"
  parameters:
    - name: scope
      value: "accuracy,clarity,usefulness"
    - name: min-score
      value: "0.8"
    - name: model.name
      value: default
