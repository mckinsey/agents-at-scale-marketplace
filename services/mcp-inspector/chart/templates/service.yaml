apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-inspector.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-inspector.labels" . | nindent 4 }}
  {{- if .Values.uiUrl }}
  annotations:
    ark.mckinsey.com/marketplace-item-ui-url: {{ .Values.uiUrl | quote }}
    {{- if .Values.uiLabel }}
    ark.mckinsey.com/marketplace-item-ui-label: {{ .Values.uiLabel | quote }}
    {{- end }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.clientPort }}
    targetPort: client
    protocol: TCP
    name: client
  - port: {{ .Values.service.proxyPort }}
    targetPort: proxy
    protocol: TCP
    name: proxy
  selector:
    {{- include "mcp-inspector.selectorLabels" . | nindent 4 }}
