apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "companies-house-mcp.fullname" . }}
  labels:
    {{- include "companies-house-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "companies-house-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "companies-house-mcp.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "companies-house-mcp.fullname" . }}-sa
      automountServiceAccountToken: false
      containers:
        - name: companies-house-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: COMPANIES_HOUSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.companiesHouse.apiKeySecret.name }}
                  key: {{ .Values.companiesHouse.apiKeySecret.key }}
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
