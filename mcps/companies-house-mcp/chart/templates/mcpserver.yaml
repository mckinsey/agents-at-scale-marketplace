{{- if .Values.mcpServer.enabled }}
apiVersion: ark.mckinsey.com/v1alpha1
kind: MCPServer
metadata:
  name: {{ .Values.mcpServer.nameOverride | default (include "companies-house-mcp.fullname" .) }}
  labels:
    {{- include "companies-house-mcp.labels" . | nindent 4 }}
spec:
  description: "UK Companies House API - company search and persons with significant control"
  transport: http
  address:
    valueFrom:
      serviceRef:
        name: {{ include "companies-house-mcp.fullname" . }}
        port: http
        path: /mcp
  timeout: {{ .Values.mcpServer.timeout }}
{{- end }}
