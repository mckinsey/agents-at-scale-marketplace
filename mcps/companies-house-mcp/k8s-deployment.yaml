---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: companies-house-mcp
  namespace: default
automountServiceAccountToken: false
---
apiVersion: v1
kind: Service
metadata:
  name: companies-house-mcp
  namespace: default
spec:
  selector:
    app: companies-house-mcp
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: companies-house-mcp
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: companies-house-mcp
  template:
    metadata:
      labels:
        app: companies-house-mcp
    spec:
      serviceAccountName: companies-house-mcp
      containers:
      - name: companies-house-mcp
        image: companies-house-mcp:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: COMPANIES_HOUSE_API_KEY
          valueFrom:
            secretKeyRef:
              name: companies-house-api-key
              key: api-key
              optional: false
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: ark.mckinsey.com/v1alpha1
kind: MCPServer
metadata:
  name: companies-house
  namespace: default
spec:
  description: "UK Companies House API - company search and persons with significant control"
  transport: http
  address:
    valueFrom:
      serviceRef:
        name: companies-house-mcp
        port: http
        path: /mcp
  timeout: "30s"
