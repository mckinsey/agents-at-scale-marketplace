replicaCount: 1

image:
  repository: perplexity-ask-mcp
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000

perplexity:
  model: "sonar"
  apiKeySecret:
    name: web-search-credentials
    key: perplexity-api-key

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "512Mi"
    cpu: "500m"

mcpServer:
  enabled: true
  # MCPServer CRD name "perplexity" + tool "ask" => ARK Tool "perplexity-ask" (LegacyX-compatible)
  nameOverride: "perplexity"
  timeout: "90s"
