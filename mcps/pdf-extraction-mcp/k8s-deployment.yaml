---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pdf-extraction-mcp
  namespace: default
automountServiceAccountToken: false
---
apiVersion: v1
kind: Service
metadata:
  name: pdf-extraction-mcp
  namespace: default
spec:
  selector:
    app: pdf-extraction-mcp
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pdf-extraction-mcp
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pdf-extraction-mcp
  template:
    metadata:
      labels:
        app: pdf-extraction-mcp
    spec:
      serviceAccountName: pdf-extraction-mcp
      volumes:
      - name: mcp-filesystem-volume
        hostPath:
          path: /mnt/output
          type: DirectoryOrCreate
      containers:
      - name: pdf-extraction-mcp
        image: pdf-extraction-mcp:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
          name: http
        volumeMounts:
        - name: mcp-filesystem-volume
          mountPath: /mnt/output
          readOnly: true
        env:
        - name: LLM_PROVIDER
          value: "openai"
        - name: LLM_MODEL
          value: "gpt-4"
        - name: LLM_BASE_URL
          valueFrom:
            secretKeyRef:
              name: ai-gateway-azure-openai
              key: base-url
              optional: true
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-gateway-azure-openai
              key: token
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: ark.mckinsey.com/v1alpha1
kind: MCPServer
metadata:
  name: pdf-extraction-mcp
  namespace: default
spec:
  description: "Lightweight PDF extraction server for ownership information"
  transport: http
  address:
    valueFrom:
      serviceRef:
        name: pdf-extraction-mcp
        port: http
        path: /mcp
  timeout: "120s"
