replicaCount: 1

# When sharing PVC with file-gateway (existingClaim=file-gateway-storage), set runAsUser/fsGroup 1000
# so files created by the MCP have the same owner as VersityGW and list_objects does not break.
podSecurityContext:
  runAsUser: null
  runAsGroup: null
  fsGroup: null

image:
  repository: ghcr.io/mckinsey/agents-at-scale-marketplace/filesystem-mcp-server
  # tag defaults to .Chart.AppVersion if not specified
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

env:
  PORT: "8080"
  BASE_DATA_DIR: "/data"
  SESSION_FILE: "/data/sessions/sessions.json"
  MAX_SESSIONS: "1000"

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  # When set, use this existing PVC instead of creating one (e.g. share file-gateway storage).
  existingClaim: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi
    ephemeral-storage: 100Mi

nodeSelector: {}

tolerations: []

affinity: {}

serviceAccount:
  name: mcp-filesystem-sa
  create: true