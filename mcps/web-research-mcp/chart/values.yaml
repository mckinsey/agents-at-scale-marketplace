replicaCount: 1

image:
  repository: web-research-mcp
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000

search:
  provider: "tavily"
  credentialsSecret:
    name: web-search-credentials
    tavilyApiKeyField: tavily-api-key
    perplexityApiKeyField: perplexity-api-key

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "512Mi"
    cpu: "500m"

mcpServer:
  enabled: true
  timeout: "60s"
