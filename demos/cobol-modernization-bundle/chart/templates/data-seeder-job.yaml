{{- if .Values.dataSeeder.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: data-seeder
  labels:
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app: data-seeder
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-gateway
          image: "{{ .Values.dataSeeder.image.repository }}:{{ .Values.dataSeeder.image.tag }}"
          imagePullPolicy: {{ .Values.dataSeeder.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              GATEWAY="http://file-gateway-api:80"
              echo "Waiting for file-gateway-api to be ready..."
              for i in $(seq 1 90); do
                if curl -sf "${GATEWAY}/health"; then echo "file-gateway-api is ready."; exit 0; fi
                echo "  attempt $$i/90, retrying in 5s..."
                sleep 5
              done
              echo "Timeout waiting for file-gateway-api"; exit 1
      containers:
        - name: data-seeder
          image: "{{ .Values.dataSeeder.image.repository }}:{{ .Values.dataSeeder.image.tag }}"
          imagePullPolicy: {{ .Values.dataSeeder.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              for file in /data/*; do
                curl --fail -X POST "http://file-gateway-api:80/files" -F "file=@${file}" -F "prefix=cobol-source/"
              done
{{- end }}