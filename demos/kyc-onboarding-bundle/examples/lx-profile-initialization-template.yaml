apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lx-profile-initialization
  namespace: default
  annotations:
    workflows.argoproj.io/title: "Phase I - Customer Profile Initialization - 1. Profile Initialization"
    workflows.argoproj.io/description: "Extract inquiry information from customer email"
    workflows.argoproj.io/version: "v0.0.1"
spec:
  entrypoint: main
  serviceAccountName: kyc-onboarding-bundle-argo-workflow
  arguments:
    parameters:
      - name: email-file
        value: "source_code_files/1-customer-profile-initialization/input/mock-up-email-abf.txt"
      - name: output-file
        value: "source_code_files/1-customer-profile-initialization/intermediate/inquiry_information.json"

  templates:
    # ============================================================
    # Main workflow
    # ============================================================
    - name: main
      inputs:
        parameters:
          - name: email-file
            value: "{{workflow.parameters.email-file}}"
          - name: output-file
            value: "{{workflow.parameters.output-file}}"
      outputs:
        parameters:
          - name: output-file
            valueFrom:
              parameter: "{{steps.extract-inquiry-information.outputs.parameters.output-file}}"
      steps:
        - - name: extract-inquiry-information
            template: extract-inquiry-query
            arguments:
              parameters:
                - name: email-file
                  value: "{{inputs.parameters.email-file}}"
                - name: output-file
                  value: "{{inputs.parameters.output-file}}"

    # ============================================================
    # Extract inquiry information from email
    # ============================================================
    - name: extract-inquiry-query
      inputs:
        parameters:
          - name: email-file
            value: "{{workflow.parameters.email-file}}"
          - name: output-file
            value: "{{workflow.parameters.output-file}}"
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: extract-inquiry-
          spec:
            target:
              type: agent
              name: consolidation-analyst-agent
            input: |
              Read the customer inquiry email from: {{inputs.parameters.email-file}}
              
              Extract the following information from the email and save it as a JSON file:
              
              {
                "inquiry_date": "Date of inquiry (YYYY-MM-DD format)",
                "company_name": "Full legal name of the company",
                "contact_person": {
                  "name": "Name of the contact person",
                  "title": "Title/position",
                  "email": "Email address",
                  "phone": "Phone number if mentioned"
                },
                "inquiry_type": "Type of inquiry (e.g., 'New Customer Onboarding', 'KYC Renewal')",
                "products_services_requested": ["List of products or services requested"],
                "additional_information": "Any other relevant information from the email"
              }
              
              Save the extracted information to: {{inputs.parameters.output-file}}
              
              Use the 'mcp-filesystem-read-file' tool to read the email.
              Use the 'mcp-filesystem-write-file' tool to save the JSON output.
            timeout: 3m
