apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lx-adverse-media-screening
  annotations:
    workflows.argoproj.io/title: "Phase II - Customer Due Diligence - 2a. Adverse Media Screening"
    workflows.argoproj.io/description: "Conduct adverse media screening via web research and classify relevance"
    workflows.argoproj.io/version: "v0.0.1"
    workflows.argoproj.io/migrated-from: "legacyx"
spec:
  entrypoint: main
  serviceAccountName: kyc-onboarding-bundle-argo-workflow
  
  volumes:
    - name: mcp-filesystem-volume
      hostPath:
        path: /mnt/output
        type: DirectoryOrCreate
  
  arguments:
    parameters:
      - name: company-name
        value: "ASSOCIATED BRITISH FOODS PLC"
      - name: output-base-dir
        value: "source_code_files/2-customer-due-diligence"
      - name: execution-mode
        value: "sequential"
        enum:
          - sequential
          - parallel
  
  templates:
    # ============================================================
    # MAIN WORKFLOW
    # ============================================================
    - name: main
      inputs:
        parameters:
          - name: company-name
            value: "{{workflow.parameters.company-name}}"
          - name: output-base-dir
            value: "{{workflow.parameters.output-base-dir}}"
          - name: execution-mode
            value: "{{workflow.parameters.execution-mode}}"
      steps:
        # Step 1: Get current date
        - - name: get-current-date
            template: get-current-date-script
        
        # Step 2: Get adverse media screening prompts from YAML
        - - name: get-adverse-media-prompts
            template: read-prompts-file
            arguments:
              parameters:
                - name: prompts-file-path
                  value: "{{inputs.parameters.output-base-dir}}/input/prompts_adverse_media_screening.yml"
        
        # Step 3: Conduct adverse media search (conditional execution)
        - - name: conduct-adverse-media-search-sequential
            when: "{{inputs.parameters.execution-mode}} == sequential"
            template: collect-web-data-sequential
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{steps.get-adverse-media-prompts.outputs.parameters.prompts-list}}"
                - name: company-name
                  value: "{{inputs.parameters.company-name}}"
                - name: output-dir
                  value: "{{inputs.parameters.output-base-dir}}/intermediate/adverse_media_screening"
                - name: current-date
                  value: "{{steps.get-current-date.outputs.parameters.current-date}}"
        
          - name: conduct-adverse-media-search-parallel
            when: "{{inputs.parameters.execution-mode}} == parallel"
            template: collect-web-data-parallel
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{steps.get-adverse-media-prompts.outputs.parameters.prompts-list}}"
                - name: company-name
                  value: "{{inputs.parameters.company-name}}"
                - name: output-dir
                  value: "{{inputs.parameters.output-base-dir}}/intermediate/adverse_media_screening"
                - name: current-date
                  value: "{{steps.get-current-date.outputs.parameters.current-date}}"
        
        # Step 4: Read adverse media JSON directory
        - - name: read-adverse-media-json-directory
            template: readdir-script
            arguments:
              parameters:
                - name: base-dir
                  value: "{{inputs.parameters.output-base-dir}}/intermediate/adverse_media_screening"
        
        # Step 5: Determine relevance for each file
        - - name: determine-relevance
            template: relevance-classification-query
            arguments:
              parameters:
                - name: company-name
                  value: "{{inputs.parameters.company-name}}"
                - name: file-path
                  value: "{{item}}"
                - name: current-date
                  value: "{{steps.get-current-date.outputs.parameters.current-date}}"
            withParam: "{{steps.read-adverse-media-json-directory.outputs.parameters.file-paths}}"
        
        # Step 6: Combine JSON files
        - - name: append-info-files
            template: combine-json
            arguments:
              parameters:
                - name: file-paths-json
                  value: "{{steps.read-adverse-media-json-directory.outputs.parameters.file-paths}}"
                - name: output-file
                  value: "{{inputs.parameters.output-base-dir}}/profile_sections/adverse_media_screening.json"
        
        # Step 7: Summarize adverse media screening
        - - name: summarize-adverse-media-screening
            template: summarize-adverse-media-query
            arguments:
              parameters:
                - name: input-file
                  value: "{{inputs.parameters.output-base-dir}}/profile_sections/adverse_media_screening.json"
                - name: output-file
                  value: "{{inputs.parameters.output-base-dir}}/output/adverse_media_screening_summary.md"
    
    # ============================================================
    # UTILITY TEMPLATES
    # ============================================================
    
    # Get current date
    - name: get-current-date-script
      script:
        image: alpine:latest
        command: [sh]
        source: |
          date +%Y-%m-%d > /tmp/current_date.txt
          cat /tmp/current_date.txt
      outputs:
        parameters:
          - name: current-date
            valueFrom:
              path: /tmp/current_date.txt
    
    # Read prompts from YAML file
    - name: read-prompts-file
      inputs:
        parameters:
          - name: prompts-file-path
      script:
        image: alpine/k8s:1.28.13
        command: [sh]
        source: |
          PROMPTS_FILE="/data/{{inputs.parameters.prompts-file-path}}"
          
          # Read YAML and transform nested object to array format
          kubectl exec deployment/mcp-filesystem -- cat "$PROMPTS_FILE" | yq eval -o=json '.adverse_media_screening | to_entries | map({"section": .key, "prompt": .value.objective})' - > /tmp/prompts.json
          
      outputs:
        parameters:
          - name: prompts-list
            valueFrom:
              path: /tmp/prompts.json
    
    # Collect web data sequentially
    - name: collect-web-data-sequential
      inputs:
        parameters:
          - name: prompts-json
          - name: company-name
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-web-prompt
            template: web-data-query
            arguments:
              parameters:
                - name: prompt
                  value: "{{item.prompt}}"
                - name: section
                  value: "{{item.section}}"
                - name: company-name
                  value: "{{inputs.parameters.company-name}}"
                - name: output-dir
                  value: "{{inputs.parameters.output-dir}}"
                - name: current-date
                  value: "{{inputs.parameters.current-date}}"
            withParam: "{{inputs.parameters.prompts-json}}"
    
    # Collect web data in parallel
    - name: collect-web-data-parallel
      inputs:
        parameters:
          - name: prompts-json
          - name: company-name
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-all-web-prompts
            template: web-data-query
            arguments:
              parameters:
                - name: prompt
                  value: "{{item.prompt}}"
                - name: section
                  value: "{{item.section}}"
                - name: company-name
                  value: "{{inputs.parameters.company-name}}"
                - name: output-dir
                  value: "{{inputs.parameters.output-dir}}"
                - name: current-date
                  value: "{{inputs.parameters.current-date}}"
            withParam: "{{inputs.parameters.prompts-json}}"
    
    # ARK Query: Collect web data using web enricher agent
    - name: web-data-query
      inputs:
        parameters:
          - name: prompt
          - name: section
          - name: company-name
          - name: output-dir
          - name: current-date
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: web-data-
          spec:
            target:
              type: team
              name: web-research-team
            input: |
              Current date: {{inputs.parameters.current-date}}
              Company: {{inputs.parameters.company-name}}
              Section: {{inputs.parameters.section}}
              
              Research Task:
              {{inputs.parameters.prompt}}
              
              INSTRUCTIONS:
              1. Use the 'web-research-mcp-research-ubo-web' tool to research adverse media information about the company
              2. After collecting the information, save it to a JSON file using the 'mcp-filesystem-write-file' tool
              3. Use the section name as part of the filename: /data/{{inputs.parameters.output-dir}}/{{inputs.parameters.section}}.json
              
              The JSON structure should follow this format:
              {
                "section": "{{inputs.parameters.section}}",
                "prompt": "{{inputs.parameters.prompt}}",
                "company": "{{inputs.parameters.company-name}}",
                "research_date": "{{inputs.parameters.current-date}}",
                "data": <researched_information>,
                "sources": [<list_of_web_sources>]
              }
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
    
    # Read directory and return file paths
    - name: readdir-script
      inputs:
        parameters:
          - name: base-dir
      script:
        image: alpine/k8s:1.28.13
        command: [sh]
        source: |
          BASE_DIR="{{inputs.parameters.base-dir}}"
          
          # Use kubectl exec to find files via mcp-filesystem
          FILES=$(kubectl exec deployment/mcp-filesystem -- find "/data/$BASE_DIR" -type f -name "*.json" 2>/dev/null || echo "[]")
          
          if [ "$FILES" = "[]" ] || [ -z "$FILES" ]; then
            echo "[]" > /tmp/file_paths.json
          else
            # Convert to JSON array, removing /data/ prefix
            echo "$FILES" | sed 's|/data/||g' | jq -R -s -c 'split("\n") | map(select(length > 0))' > /tmp/file_paths.json
          fi
          
          cat /tmp/file_paths.json
      outputs:
        parameters:
          - name: file-paths
            valueFrom:
              path: /tmp/file_paths.json
    
    # ARK Query: Classify relevance of adverse media findings
    - name: relevance-classification-query
      inputs:
        parameters:
          - name: company-name
          - name: file-path
          - name: current-date
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: relevance-
          spec:
            target:
              type: agent
              name: relevance-classification-agent
            input: |
              Current date: {{inputs.parameters.current-date}}
              Company: {{inputs.parameters.company-name}}
              
              Read the adverse media findings from: /data/{{inputs.parameters.file-path}}
              
              Analyze the findings and classify their relevance to {{inputs.parameters.company-name}}:
              
              Relevance classification:
              - HIGH: Direct and significant adverse information about the company
              - MEDIUM: Potentially relevant but indirect or minor issues
              - LOW: Mentioned but not significantly relevant
              - NOT RELEVANT: False positive or unrelated
              
              For each finding, add a "relevance" field with the classification and a brief explanation.
              
              Update the original file with the relevance classifications using the `write-file` tool.
              Write back to: /data/{{inputs.parameters.file-path}}
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
    
    # Combine JSON files
    - name: combine-json
      inputs:
        parameters:
          - name: file-paths-json
          - name: output-file
      script:
        image: alpine/k8s:1.28.13
        command: [sh]
        source: |
          FILE_PATHS='{{inputs.parameters.file-paths-json}}'
          OUTFILE="/data/{{inputs.parameters.output-file}}"
          
          # Create output directory
          kubectl exec deployment/mcp-filesystem -- mkdir -p "$(dirname $OUTFILE)"
          
          # Combine all JSON files using kubectl exec
          COMBINED="[]"
          for file in $(echo "$FILE_PATHS" | jq -r '.[]'); do
            CONTENT=$(kubectl exec deployment/mcp-filesystem -- cat "/data/$file" 2>/dev/null || echo '{}')
            COMBINED=$(echo "$COMBINED" | jq ". += [$CONTENT]")
          done
          
          # Write combined JSON
          echo "$COMBINED" | kubectl exec -i deployment/mcp-filesystem -- tee "$OUTFILE" > /dev/null
          
          echo "Combined $(echo $FILE_PATHS | jq 'length') files into $OUTFILE"
    
    # ARK Query: Summarize adverse media screening results
    - name: summarize-adverse-media-query
      inputs:
        parameters:
          - name: input-file
          - name: output-file
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: summarize-ams-
          spec:
            target:
              type: agent
              name: summary-assessment-agent
            input: |
              Read the adverse media screening results from: /data/{{inputs.parameters.input-file}}
              
              Create a comprehensive summary of the adverse media screening in Markdown format.
              
              The summary should include:
              1. Executive Summary
              2. High Relevance Findings (if any)
              3. Medium Relevance Findings (if any)
              4. Low Relevance Findings (summary only)
              5. Overall Risk Assessment
              6. Recommendations
              
              For each finding, include:
              - Title/headline
              - Relevance classification
              - Summary of the issue
              - Sources
              - Date of occurrence
              
              Save the Markdown summary to: /data/{{inputs.parameters.output-file}}
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
