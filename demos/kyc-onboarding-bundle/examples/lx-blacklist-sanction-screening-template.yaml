apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lx-blacklist-sanction-screening
  annotations:
    workflows.argoproj.io/title: "Phase II - Customer Due Diligence - 2b/2c. Blacklist and Sanctions Screening"
    workflows.argoproj.io/description: "Screen beneficial owners and key controllers against blacklists and UK sanctions list"
    workflows.argoproj.io/version: "v0.0.1"
    workflows.argoproj.io/migrated-from: "legacyx"
spec:
  entrypoint: main
  serviceAccountName: kyc-onboarding-bundle-argo-workflow
  
  volumes:
    - name: mcp-filesystem-volume
      hostPath:
        path: /mnt/output
        type: DirectoryOrCreate
  
  arguments:
    parameters:
      - name: output-base-dir
        value: "source_code_files/2-customer-due-diligence"
      - name: execution-mode
        value: "sequential"
        enum:
          - sequential
          - parallel
  
  templates:
    # ============================================================
    # MAIN WORKFLOW
    # ============================================================
    - name: main
      inputs:
        parameters:
          - name: output-base-dir
            value: "{{workflow.parameters.output-base-dir}}"
          - name: execution-mode
            value: "{{workflow.parameters.execution-mode}}"
      steps:
        # Step 1: Load UK sanctions list
        - - name: load-sanctions-list
            template: load-uk-sanctions-list
            arguments:
              parameters:
                - name: output-file
                  value: "{{inputs.parameters.output-base-dir}}/downloads/uk_sanctions_list.txt"
        
        # Step 2: Create screening list from multiple sources
        - - name: create-screening-list
            template: create-screening-list-query
            arguments:
              parameters:
                - name: owners-file
                  value: "{{inputs.parameters.output-base-dir}}/profile_sections/beneficial_ownership_tree.json"
                - name: key-controllers-file
                  value: "{{inputs.parameters.output-base-dir}}/profile_sections/key_controllers.json"
                - name: entities-vessels-file
                  value: "{{inputs.parameters.output-base-dir}}/profile_sections/entities_vessels.json"
                - name: output-file
                  value: "{{inputs.parameters.output-base-dir}}/tmp/screening_list.yaml"
        
        # Step 3: Parse screening list to get names
        - - name: get-key-controller-names
            template: read-yaml-to-list
            arguments:
              parameters:
                - name: yaml-file-path
                  value: "{{inputs.parameters.output-base-dir}}/tmp/screening_list.yaml"
                - name: section
                  value: "key_controllers"
        
        # Step 4: Blacklist screening (conditional execution)
        - - name: blacklist-screening-sequential
            when: "{{inputs.parameters.execution-mode}} == sequential"
            template: blacklist-screening-sequential
            arguments:
              parameters:
                - name: names-json
                  value: "{{steps.get-key-controller-names.outputs.parameters.names-list}}"
                - name: blacklist-file
                  value: "mock-up-blacklist.json"
                - name: output-dir
                  value: "{{inputs.parameters.output-base-dir}}/screening/blacklist_report"
        
          - name: blacklist-screening-parallel
            when: "{{inputs.parameters.execution-mode}} == parallel"
            template: blacklist-screening-parallel
            arguments:
              parameters:
                - name: names-json
                  value: "{{steps.get-key-controller-names.outputs.parameters.names-list}}"
                - name: blacklist-file
                  value: "mock-up-blacklist.json"
                - name: output-dir
                  value: "{{inputs.parameters.output-base-dir}}/screening/blacklist_report"
        
        # Step 5: Read blacklist JSON directory
        - - name: read-blacklist-json-directory
            template: readdir-script
            arguments:
              parameters:
                - name: base-dir
                  value: "{{inputs.parameters.output-base-dir}}/screening/blacklist_report"
        
        # Step 6: Combine blacklist files
        - - name: append-blacklist-files
            template: combine-json
            arguments:
              parameters:
                - name: file-paths-json
                  value: "{{steps.read-blacklist-json-directory.outputs.parameters.file-paths}}"
                - name: output-file
                  value: "{{inputs.parameters.output-base-dir}}/screening/blacklist.json"
        
        # Step 7: Sanction list screening (conditional execution)
        - - name: sanction-list-screening-sequential
            when: "{{inputs.parameters.execution-mode}} == sequential"
            template: sanction-list-screening-sequential
            arguments:
              parameters:
                - name: names-json
                  value: "{{steps.get-key-controller-names.outputs.parameters.names-list}}"
                - name: sanctions-file
                  value: "uk_sanctions_list.txt"
                - name: output-dir
                  value: "{{inputs.parameters.output-base-dir}}/screening/sanction_report"
        
          - name: sanction-list-screening-parallel
            when: "{{inputs.parameters.execution-mode}} == parallel"
            template: sanction-list-screening-parallel
            arguments:
              parameters:
                - name: names-json
                  value: "{{steps.get-key-controller-names.outputs.parameters.names-list}}"
                - name: sanctions-file
                  value: "uk_sanctions_list.txt"
                - name: output-dir
                  value: "{{inputs.parameters.output-base-dir}}/screening/sanction_report"
        
        # Step 8: Read sanction list JSON directory
        - - name: read-sanction-list-json-directory
            template: readdir-script
            arguments:
              parameters:
                - name: base-dir
                  value: "{{inputs.parameters.output-base-dir}}/screening/sanction_report"
        
        # Step 9: Combine sanction list files
        - - name: append-sanction-list-files
            template: combine-json
            arguments:
              parameters:
                - name: file-paths-json
                  value: "{{steps.read-sanction-list-json-directory.outputs.parameters.file-paths}}"
                - name: output-file
                  value: "{{inputs.parameters.output-base-dir}}/screening/sanction_list.json"
        
        # Step 10: Get current date
        - - name: get-current-date
            template: get-current-date-script
        
        # Step 11: Summarize screening results
        - - name: summarize-screening-results
            template: summarize-sanctions-query
            arguments:
              parameters:
                - name: blacklist-file
                  value: "{{inputs.parameters.output-base-dir}}/screening/blacklist.json"
                - name: sanction-file
                  value: "{{inputs.parameters.output-base-dir}}/screening/sanction_list.json"
                - name: json-output-file
                  value: "{{inputs.parameters.output-base-dir}}/profile_sections/sanction_blacklist_screening.json"
                - name: md-output-file
                  value: "{{inputs.parameters.output-base-dir}}/output/sanction_blacklist_screening_report.md"
                - name: current-date
                  value: "{{steps.get-current-date.outputs.parameters.current-date}}"
    
    # ============================================================
    # UTILITY TEMPLATES
    # ============================================================
    
    # Get current date
    - name: get-current-date-script
      script:
        image: alpine:latest
        command: [sh]
        source: |
          date +%Y-%m-%d > /tmp/current_date.txt
          cat /tmp/current_date.txt
      outputs:
        parameters:
          - name: current-date
            valueFrom:
              path: /tmp/current_date.txt
    
    # Load UK sanctions list
    - name: load-uk-sanctions-list
      inputs:
        parameters:
          - name: output-file
      script:
        image: curlimages/curl:latest
        command: [sh]
        source: |
          OUTPUT_FILE="/data/{{inputs.parameters.output-file}}"
          
          # Download UK sanctions list
          curl -L "https://www.gov.uk/government/publications/financial-sanctions-consolidated-list-of-targets/consolidated-list-of-targets" \
            -o /tmp/uk_sanctions_list.txt
          
          # Use kubectl to copy to mcp-filesystem
          kubectl exec -i deployment/mcp-filesystem -- tee "$OUTPUT_FILE" < /tmp/uk_sanctions_list.txt > /dev/null
          
          echo "Downloaded UK sanctions list to $OUTPUT_FILE"
    
    # ARK Query: Create screening list from multiple sources
    - name: create-screening-list-query
      inputs:
        parameters:
          - name: owners-file
          - name: key-controllers-file
          - name: entities-vessels-file
          - name: output-file
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: screening-list-
          spec:
            target:
              type: agent
              name: consolidation-analyst-agent
            input: |
              Read the following files:
              - Beneficial owners: /data/{{inputs.parameters.owners-file}}
              - Key controllers: /data/{{inputs.parameters.key-controllers-file}}
              - Entities and vessels: /data/{{inputs.parameters.entities-vessels-file}}
              
              Extract all person names and entity names that need to be screened.
              
              Create a YAML file with a list of names to screen in the following format:
              
              key_controllers:
                - name: "Person Name 1"
                - name: "Person Name 2"
                - name: "Entity Name 1"
              
              Include:
              - All beneficial owners (direct and indirect)
              - All key controllers (directors and management)
              - All subsidiary entities
              - All vessel names (if any)
              
              Save the YAML file to: /data/{{inputs.parameters.output-file}}
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
    
    # Read YAML file and convert to list
    - name: read-yaml-to-list
      inputs:
        parameters:
          - name: yaml-file-path
          - name: section
      script:
        image: alpine/k8s:1.28.13
        command: [sh]
        source: |
          YAML_FILE="/data/{{inputs.parameters.yaml-file-path}}"
          SECTION="{{inputs.parameters.section}}"
          
          # Use kubectl exec to read file via mcp-filesystem
          NAMES_JSON=$(kubectl exec deployment/mcp-filesystem -- cat "$YAML_FILE" | yq eval ".${SECTION}" -o=json)
          
          echo "$NAMES_JSON" > /tmp/names.json
          cat /tmp/names.json
      outputs:
        parameters:
          - name: names-list
            valueFrom:
              path: /tmp/names.json
    
    # Blacklist screening sequential
    - name: blacklist-screening-sequential
      inputs:
        parameters:
          - name: names-json
          - name: blacklist-file
          - name: output-dir
      steps:
        - - name: screen-name
            template: screening-in-document-query
            arguments:
              parameters:
                - name: name
                  value: "{{item.name}}"
                - name: document-file
                  value: "{{inputs.parameters.blacklist-file}}"
                - name: screening-type
                  value: "blacklist"
                - name: output-dir
                  value: "{{inputs.parameters.output-dir}}"
            withParam: "{{inputs.parameters.names-json}}"
    
    # Blacklist screening parallel
    - name: blacklist-screening-parallel
      inputs:
        parameters:
          - name: names-json
          - name: blacklist-file
          - name: output-dir
      steps:
        - - name: screen-all-names
            template: screening-in-document-query
            arguments:
              parameters:
                - name: name
                  value: "{{item.name}}"
                - name: document-file
                  value: "{{inputs.parameters.blacklist-file}}"
                - name: screening-type
                  value: "blacklist"
                - name: output-dir
                  value: "{{inputs.parameters.output-dir}}"
            withParam: "{{inputs.parameters.names-json}}"
    
    # Sanction list screening sequential
    - name: sanction-list-screening-sequential
      inputs:
        parameters:
          - name: names-json
          - name: sanctions-file
          - name: output-dir
      steps:
        - - name: screen-name
            template: screening-in-document-query
            arguments:
              parameters:
                - name: name
                  value: "{{item.name}}"
                - name: document-file
                  value: "{{inputs.parameters.sanctions-file}}"
                - name: screening-type
                  value: "sanction list"
                - name: output-dir
                  value: "{{inputs.parameters.output-dir}}"
            withParam: "{{inputs.parameters.names-json}}"
    
    # Sanction list screening parallel
    - name: sanction-list-screening-parallel
      inputs:
        parameters:
          - name: names-json
          - name: sanctions-file
          - name: output-dir
      steps:
        - - name: screen-all-names
            template: screening-in-document-query
            arguments:
              parameters:
                - name: name
                  value: "{{item.name}}"
                - name: document-file
                  value: "{{inputs.parameters.sanctions-file}}"
                - name: screening-type
                  value: "sanction list"
                - name: output-dir
                  value: "{{inputs.parameters.output-dir}}"
            withParam: "{{inputs.parameters.names-json}}"
    
    # ARK Query: Screen name in document
    - name: screening-in-document-query
      inputs:
        parameters:
          - name: name
          - name: document-file
          - name: screening-type
          - name: output-dir
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: screen-
          spec:
            target:
              type: agent
              name: rag-agent
            input: |
              Name to screen: {{inputs.parameters.name}}
              Screening type: {{inputs.parameters.screening-type}}
              
              Search for "{{inputs.parameters.name}}" in the document at: /data/data/pdfs/{{inputs.parameters.document-file}}
              
              Use the `pdf-extraction-mcp-analyze-pdf-ownership` tool to search the document.
              
              Check if the name appears in the {{inputs.parameters.screening-type}}.
              
              Result format:
              {
                "name": "{{inputs.parameters.name}}",
                "screening_type": "{{inputs.parameters.screening-type}}",
                "found": true/false,
                "matches": [
                  {
                    "match_text": "Text from document",
                    "match_score": 0.95,
                    "page": 5
                  }
                ],
                "risk_level": "HIGH/MEDIUM/LOW/NONE"
              }
              
              Calculate the hash of the name using MD5 for the filename.
              Name hash: $(echo -n "{{inputs.parameters.name}}" | md5sum | cut -d' ' -f1)
              
              Save the result to: /data/{{inputs.parameters.output-dir}}/[name_hash].json
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
    
    # Read directory and return file paths
    - name: readdir-script
      inputs:
        parameters:
          - name: base-dir
      script:
        image: alpine/k8s:1.28.13
        command: [sh]
        source: |
          BASE_DIR="{{inputs.parameters.base-dir}}"
          
          # Use kubectl exec to find files via mcp-filesystem
          FILES=$(kubectl exec deployment/mcp-filesystem -- find "/data/$BASE_DIR" -type f -name "*.json" 2>/dev/null || echo "[]")
          
          if [ "$FILES" = "[]" ] || [ -z "$FILES" ]; then
            echo "[]" > /tmp/file_paths.json
          else
            # Convert to JSON array, removing /data/ prefix
            echo "$FILES" | sed 's|/data/||g' | jq -R -s -c 'split("\n") | map(select(length > 0))' > /tmp/file_paths.json
          fi
          
          cat /tmp/file_paths.json
      outputs:
        parameters:
          - name: file-paths
            valueFrom:
              path: /tmp/file_paths.json
    
    # Combine JSON files
    - name: combine-json
      inputs:
        parameters:
          - name: file-paths-json
          - name: output-file
      script:
        image: alpine/k8s:1.28.13
        command: [sh]
        source: |
          FILE_PATHS='{{inputs.parameters.file-paths-json}}'
          OUTFILE="/data/{{inputs.parameters.output-file}}"
          
          # Create output directory
          kubectl exec deployment/mcp-filesystem -- mkdir -p "$(dirname $OUTFILE)"
          
          # Combine all JSON files using kubectl exec
          COMBINED="[]"
          for file in $(echo "$FILE_PATHS" | jq -r '.[]'); do
            CONTENT=$(kubectl exec deployment/mcp-filesystem -- cat "/data/$file" 2>/dev/null || echo '{}')
            COMBINED=$(echo "$COMBINED" | jq ". += [$CONTENT]")
          done
          
          # Write combined JSON
          echo "$COMBINED" | kubectl exec -i deployment/mcp-filesystem -- tee "$OUTFILE" > /dev/null
          
          echo "Combined $(echo $FILE_PATHS | jq 'length') files into $OUTFILE"
    
    # ARK Query: Summarize sanctions screening results
    - name: summarize-sanctions-query
      inputs:
        parameters:
          - name: blacklist-file
          - name: sanction-file
          - name: json-output-file
          - name: md-output-file
          - name: current-date
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: summarize-sanctions-
          spec:
            target:
              type: agent
              name: summary-assessment-agent
            input: |
              Current date: {{inputs.parameters.current-date}}
              
              Read the screening results:
              - Blacklist screening: /data/{{inputs.parameters.blacklist-file}}
              - Sanctions screening: /data/{{inputs.parameters.sanction-file}}
              
              Analyze all screening results and create:
              
              1. A JSON summary with:
              {
                "blacklist_hits": [list of matches with risk levels],
                "sanction_hits": [list of matches with risk levels],
                "overall_risk_level": "HIGH/MEDIUM/LOW/NONE",
                "total_names_screened": number,
                "total_hits": number,
                "screening_date": "{{inputs.parameters.current-date}}"
              }
              
              Save to: /data/{{inputs.parameters.json-output-file}}
              
              2. A Markdown report with:
              - Executive Summary
              - Blacklist Screening Results
              - Sanctions Screening Results
              - Detailed Findings (for each hit)
              - Risk Assessment
              - Recommendations
              
              Save to: /data/{{inputs.parameters.md-output-file}}
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
