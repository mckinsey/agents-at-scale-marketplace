apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lx-assess-purpose-of-relationship
  annotations:
    workflows.argoproj.io/title: "Phase II - Customer Due Diligence - 3. Purpose of Relationship"
    workflows.argoproj.io/description: "Assess the purpose and nature of the business relationship"
    workflows.argoproj.io/version: "v0.0.1"
    workflows.argoproj.io/migrated-from: "legacyx"
spec:
  entrypoint: main
  serviceAccountName: kyc-onboarding-bundle-argo-workflow
  
  volumes:
    - name: mcp-filesystem-volume
      hostPath:
        path: /mnt/output
        type: DirectoryOrCreate
  
  arguments:
    parameters:
      - name: output-base-dir
        value: "source_code_files/2-customer-due-diligence"
  
  templates:
    # ============================================================
    # MAIN WORKFLOW
    # ============================================================
    - name: main
      inputs:
        parameters:
          - name: output-base-dir
            value: "{{workflow.parameters.output-base-dir}}"
      outputs:
        parameters:
          - name: output-file
            valueFrom:
              parameter: "{{steps.assess-purpose-of-relationship.outputs.parameters.output-file}}"
      steps:
        # Single step: Assess purpose of relationship
        - - name: assess-purpose-of-relationship
            template: assess-purpose-of-relationship-query
            arguments:
              parameters:
                - name: profile-file
                  value: "{{inputs.parameters.output-base-dir}}/input/kyc_profile.json"
                - name: output-file
                  value: "{{inputs.parameters.output-base-dir}}/profile_sections/purpose_of_relationship.json"
    
    # ============================================================
    # QUERY TEMPLATE
    # ============================================================
    
    # ARK Query: Assess purpose of relationship
    - name: assess-purpose-of-relationship-query
      inputs:
        parameters:
          - name: profile-file
          - name: output-file
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: purpose-relationship-
          spec:
            target:
              type: team
              name: consolidation-team
            input: |
              Read the customer profile from: /data/{{inputs.parameters.profile-file}}
              
              Based on the KYC profile information, assess and document the purpose of the business relationship.
              
              The assessment should include:
              
              1. **Nature of Business**
                 - What does the company do?
                 - What industry/sector does it operate in?
                 - What products/services does it provide?
              
              2. **Purpose of Relationship**
                 - Why is the company seeking this business relationship?
                 - What services/products will they use?
                 - What are their business objectives?
              
              3. **Expected Transaction Patterns**
                 - Expected transaction volumes
                 - Expected transaction types
                 - Geographic scope of transactions
                 - Frequency of transactions
              
              4. **Source of Funds**
                 - Where do the company's funds come from?
                 - Revenue sources
                 - Funding sources
              
              5. **Risk Assessment**
                 - Business risk level (HIGH/MEDIUM/LOW)
                 - Geographic risk
                 - Industry risk
                 - Complexity risk
              
              6. **Red Flags or Concerns**
                 - Any unusual aspects of the relationship
                 - Any concerns or items requiring additional due diligence
              
              Create a comprehensive JSON document with the assessment and save it to: /data/{{inputs.parameters.output-file}}
              
              The JSON structure should be:
              {
                "nature_of_business": {
                  "description": "...",
                  "industry": "...",
                  "products_services": [...]
                },
                "purpose_of_relationship": {
                  "description": "...",
                  "services_required": [...],
                  "business_objectives": [...]
                },
                "expected_transaction_patterns": {
                  "volume": "...",
                  "types": [...],
                  "geographic_scope": [...],
                  "frequency": "..."
                },
                "source_of_funds": {
                  "primary_sources": [...],
                  "revenue_streams": [...],
                  "funding_sources": [...]
                },
                "risk_assessment": {
                  "overall_risk_level": "HIGH/MEDIUM/LOW",
                  "business_risk": "...",
                  "geographic_risk": "...",
                  "industry_risk": "...",
                  "complexity_risk": "..."
                },
                "red_flags_concerns": [
                  "...",
                  "..."
                ],
                "additional_due_diligence_required": [
                  "...",
                  "..."
                ]
              }
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
