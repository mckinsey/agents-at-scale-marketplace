ownership_structure:
  direct_owners:
    objective: |
      Identify the direct siginificant owners and their respective ownership stakes. Clearly differentiate between individuals and entities. Do not include indirect ownership.

      Definition: Direct owners are individuals or entities that directly own or control a significant portion of the company, defined as holding 25% or more of the equity or voting rights. The ownership is not via a third party.

      Example: "The direct owners of Company Y include 
      - John Doe (direct ownership: 30% via direct equity holdings) 
      - Company ABC (direct ownership: 40%)"
   
      Keywords: direct owners, UBOs, significant shareholders, controlling owners, direct ownership, equity control, voting rights, shareholder control, ownership influence, equity stake, controlling interest

  voting_rights_distribution:
    objective: |
      Analyze the distribution of voting rights among shareholders.

      Definition: Voting rights distribution refers to the allocation of decision-making power among shareholders, including any disparities between ownership percentages and voting power due to dual-class shares or other mechanisms.

      Example: "Company B employs a dual-class share structure: Class A shares (held by public investors) represent 70% of equity but only 30% of voting power, while Class B shares (held by founders) represent 30% of equity but 70% of voting power."

      Keywords: voting rights, decision-making power, shareholder influence, dual-class shares, voting power distribution, equity vs. voting rights, shareholder control, voting structure, voting power allocation, decision-making hierarchy, voting rights analysis, shareholder voting influence, equity control mechanisms, voting disparity, voting rights hierarchy

  historical_changes:
    objective: |
      Analyze changes in ownership structure over the past five years.

      Definition: Historical ownership changes include shifts in major shareholders, institutional investor participation, insider holdings, public float percentage, and any significant transactions affecting control.

      Example: "Uber's ownership structure transformed significantly from 2018-2023: SoftBank reduced its stake from 15% to 3%, early venture investors exited completely following IPO lockup expiration, and institutional investors like BlackRock and Vanguard increased holdings to 25% combined, while founder Travis Kalanick divested his entire position."

      Keywords: shareholder evolution, ownership shifts, investor changes, stakeholder transitions, equity restructuring, shareholding patterns, ownership transformation, investor turnover, equity distribution changes, control transitions, shareholder movements, ownership realignment, investor rotation, equity shifts, stakeholder changes, capital structure evolution, ownership adjustments, shareholder restructuring, investor rebalancing, equity transitions

  group_structure:
    objective: |
      Summarize the corporate group structure, including parent companies, subsidiaries, and affiliates. Provide a comprehensive summary.

      Definition: Group structure refers to the hierarchical organization of the corporate client, detailing relationships between the parent company, subsidiaries, joint ventures, and affiliated entities.

      Example: "Company Z operates under a holding company structure: ParentCo owns 100% of Subsidiary A (operating in manufacturing) and 80% of Subsidiary B (operating in retail), while also holding a 50% stake in Joint Venture C."

      Keywords: corporate group structure, parent company, subsidiaries, affiliates, joint ventures, holding company, organizational hierarchy, corporate relationships, ownership linkages, group entities, corporate structure, entity mapping, ownership network, subsidiary relationships, affiliate structure, joint venture ownership, corporate hierarchy

  current_ownership:
    objective: |
      Identify and analyze the current ownership structure of the corporate client and provide a comprehensive summary.

      Definition: Current ownership structure includes details on major shareholders, percentage ownership by each stakeholder, types of shareholders (e.g., institutional investors, individual investors, government entities), and any cross-holdings or complex ownership arrangements.

      Example: "As of 2023, Company X's ownership structure includes: Institutional investors holding 60% (e.g., BlackRock 15%, Vanguard 10%), founders and executives holding 20%, and public shareholders holding 20%. No single shareholder owns more than 20% of the company."

      Keywords: major shareholders, ownership breakdown, equity distribution, stakeholder composition, shareholder percentages, institutional ownership, individual ownership, government ownership, cross-holdings, ownership hierarchy, equity allocation, shareholder structure, ownership profile, stakeholder analysis, equity ownership, shareholder composition
