apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lx-requirements-and-standards
  namespace: default
  annotations:
    workflows.argoproj.io/title: "Phase I - Customer Profile Initialization - 2b. Requirements and KYC Standards"
    workflows.argoproj.io/description: "Get KYC standards and requirements for geography"
    workflows.argoproj.io/version: "v0.0.1"
spec:
  entrypoint: main
  serviceAccountName: kyc-onboarding-bundle-argo-workflow
  arguments:
    parameters:
      - name: geography
        value: "UK"
      - name: output-file
        value: "source_code_files/1-customer-profile-initialization/intermediate/kyc_standards.json"

  volumes:
    - name: mcp-filesystem-volume
      hostPath:
        path: /mnt/output
        type: DirectoryOrCreate

  templates:
    # ============================================================
    # Main workflow
    # ============================================================
    - name: main
      inputs:
        parameters:
          - name: geography
            value: "{{workflow.parameters.geography}}"
          - name: output-file
            value: "{{workflow.parameters.output-file}}"
      steps:
        - - name: get-kyc-standards
            template: get-kyc-standards-script
            arguments:
              parameters:
                - name: geography
                  value: "{{inputs.parameters.geography}}"
                - name: output-file
                  value: "{{inputs.parameters.output-file}}"

    # ============================================================
    # Get KYC standards for geography (mock implementation)
    # ============================================================
    - name: get-kyc-standards-script
      inputs:
        parameters:
          - name: geography
            value: "{{workflow.parameters.geography}}"
          - name: output-file
            value: "{{workflow.parameters.output-file}}"
      script:
        image: alpine:3.19
        command: [sh]
        volumeMounts:
          - name: mcp-filesystem-volume
            mountPath: /mnt/output
        source: |
          #!/bin/sh
          set -eux
          
          GEOGRAPHY="{{inputs.parameters.geography}}"
          OUTPUT_FILE="/data/{{inputs.parameters.output-file}}"
          
          # Create output directory
          mkdir -p "$(dirname "$OUTPUT_FILE")"
          
          # Generate KYC standards JSON based on geography
          cat > "$OUTPUT_FILE" <<'EOF'
          {
            "geography": "UK",
            "regulatory_framework": "Financial Conduct Authority (FCA)",
            "kyc_requirements": {
              "customer_identification": {
                "required": true,
                "documents": [
                  "Certificate of Incorporation",
                  "Articles of Association",
                  "Register of Directors",
                  "Register of Shareholders"
                ]
              },
              "beneficial_ownership": {
                "required": true,
                "threshold_percentage": 25,
                "documentation": "Beneficial ownership structure chart required for entities with >25% ownership"
              },
              "source_of_funds": {
                "required": true,
                "documentation": "Financial statements, business plan, or other evidence of legitimate source of funds"
              },
              "risk_assessment": {
                "required": true,
                "factors": [
                  "Business nature and activities",
                  "Geographic risk",
                  "Customer type and ownership structure",
                  "Products and services used",
                  "Delivery channels"
                ]
              },
              "enhanced_due_diligence": {
                "triggers": [
                  "High-risk jurisdiction",
                  "Politically exposed persons (PEPs)",
                  "Complex ownership structures",
                  "Cash-intensive businesses"
                ]
              },
              "ongoing_monitoring": {
                "required": true,
                "frequency": "Annual or triggered by significant changes",
                "scope": "Transaction monitoring, periodic reviews, adverse media screening"
              }
            },
            "sanctions_screening": {
              "required": true,
              "lists": [
                "UK HM Treasury Sanctions List",
                "EU Consolidated Sanctions List",
                "OFAC SDN List",
                "UN Consolidated List"
              ]
            },
            "adverse_media_screening": {
              "required": true,
              "scope": "Company, beneficial owners, directors, key management"
            },
            "record_retention": {
              "minimum_period": "5 years after relationship ends",
              "documents": "All KYC documents, transaction records, correspondence"
            },
            "data_protection": {
              "framework": "UK GDPR",
              "requirements": [
                "Lawful basis for processing",
                "Data minimization",
                "Purpose limitation",
                "Storage limitation",
                "Security measures"
              ]
            }
          }
          EOF
          
          echo "✅ KYC standards for $GEOGRAPHY saved to: {{inputs.parameters.output-file}}"
