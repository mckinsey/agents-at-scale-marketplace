apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lx-profile-finalization
  namespace: default
  annotations:
    workflows.argoproj.io/title: "Populate Customer Profile"
    workflows.argoproj.io/description: "Consolidate all Phase II profile data and generate final customer profile"
    workflows.argoproj.io/version: "v0.0.1"
spec:
  entrypoint: main
  serviceAccountName: kyc-onboarding-bundle-argo-workflow
  arguments:
    parameters:
      - name: profile-sections-dir
        value: "source_code_files/2-customer-due-diligence/profile_sections"
      - name: base-profile-file
        value: "source_code_files/2-customer-due-diligence/input/kyc_profile.json"
      - name: output-dir
        value: "source_code_files/2-customer-due-diligence/output"

  volumes:
    - name: mcp-filesystem-volume
      hostPath:
        path: /mnt/output
        type: DirectoryOrCreate

  templates:
    # ============================================================
    # Main workflow
    # ============================================================
    - name: main
      inputs:
        parameters:
          - name: profile-sections-dir
            value: "{{workflow.parameters.profile-sections-dir}}"
          - name: base-profile-file
            value: "{{workflow.parameters.base-profile-file}}"
          - name: output-dir
            value: "{{workflow.parameters.output-dir}}"
      steps:
        # Step 1: Find all JSON files in profile_sections
        - - name: read-source-root-directory
            template: readdir-script
            arguments:
              parameters:
                - name: profile-sections-dir
                  value: "{{inputs.parameters.profile-sections-dir}}"
        
        # Step 2: Combine all JSON files with base profile
        - - name: concat-json-files
            template: combine-json-script
            arguments:
              parameters:
                - name: file-paths
                  value: "{{steps.read-source-root-directory.outputs.result}}"
                - name: base-profile-file
                  value: "{{inputs.parameters.base-profile-file}}"
                - name: output-dir
                  value: "{{inputs.parameters.output-dir}}"
        
        # Step 3: Convert JSON to formatted Markdown
        - - name: json-to-markdown
            template: json-to-markdown-query

    # ============================================================
    # Find all JSON files in profile_sections
    # ============================================================
    - name: readdir-script
      inputs:
        parameters:
          - name: profile-sections-dir
      script:
        image: alpine/k8s:1.28.13
        command: [sh]
        source: |
          #!/bin/sh
          set -e
          
          PROFILE_SECTIONS_DIR="{{inputs.parameters.profile-sections-dir}}"
          
          # Use kubectl exec to list files via mcp-filesystem deployment
          kubectl exec deployment/mcp-filesystem -- \
            find "/data/$PROFILE_SECTIONS_DIR" -type f -name "*.json" 2>/dev/null | \
            sed 's|^/data/||' | \
            sed 's|^|"|; s|$|"|' | \
            sed '1s|^|[|; $!s|$|,|; $s|$|]|' > /tmp/file-paths.json || echo "[]" > /tmp/file-paths.json
          
          cat /tmp/file-paths.json
      outputs:
        parameters:
          - name: result
            valueFrom:
              path: /tmp/file-paths.json

    # ============================================================
    # Combine all JSON files with base profile
    # ============================================================
    - name: combine-json-script
      inputs:
        parameters:
          - name: file-paths
          - name: base-profile-file
          - name: output-dir
      script:
        image: alpine/k8s:1.28.13
        command: [sh]
        source: |
          set -e
          
          FILE_PATHS='{{inputs.parameters.file-paths}}'
          BASE_PROFILE="{{inputs.parameters.base-profile-file}}"
          OUTPUT_FILE="{{inputs.parameters.output-dir}}/kyc_profile.json"
          
          echo "Combining profile files into: $OUTPUT_FILE"
          echo "File paths: $FILE_PATHS"
          
          # Check if file paths is empty
          if [ -z "$FILE_PATHS" ] || [ "$FILE_PATHS" = "[]" ] || [ "$FILE_PATHS" = "null" ]; then
            echo "No profile section files found. Using base profile only."
            MCP_POD=$(kubectl get pods -n default -l app.kubernetes.io/name=mcp-filesystem -o jsonpath='{.items[0].metadata.name}')
            OUTPUT_DIR=$(dirname "$OUTPUT_FILE")
            kubectl exec -n default $MCP_POD -- mkdir -p "/data/$OUTPUT_DIR"
            kubectl exec -n default $MCP_POD -- cp "/data/$BASE_PROFILE" "/data/$OUTPUT_FILE" 2>/dev/null || echo '{}' | kubectl exec -n default $MCP_POD -- sh -c "cat > /data/$OUTPUT_FILE"
            exit 0
          fi
          
          # Get mcp-filesystem pod
          MCP_POD=$(kubectl get pods -n default -l app.kubernetes.io/name=mcp-filesystem -o jsonpath='{.items[0].metadata.name}')
          
          # Create output directory
          OUTPUT_DIR=$(dirname "$OUTPUT_FILE")
          kubectl exec -n default $MCP_POD -- mkdir -p "/data/$OUTPUT_DIR"
          
          # Read base profile and all section files, then merge with jq
          {
            echo "Reading base profile: $BASE_PROFILE"
            kubectl exec -n default $MCP_POD -- cat "/data/$BASE_PROFILE" 2>/dev/null || echo '{}'
            
            echo "$FILE_PATHS" | jq -r '.[]' | while IFS= read -r file; do
              echo "Reading section: $file"
              kubectl exec -n default $MCP_POD -- cat "/data/$file" 2>/dev/null || echo '{}'
            done
          } | kubectl exec -n default $MCP_POD -- sh -c "jq -s 'reduce .[] as \$item ({}; . * \$item)' > /data/$OUTPUT_FILE"
          
          echo "✅ Profile combined successfully to: $OUTPUT_FILE"

    # ============================================================
    # Convert JSON to formatted Markdown
    # ============================================================
    - name: json-to-markdown-query
      inputs:
        parameters:
          - name: output-dir
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: profile-to-md-
          spec:
            target:
              type: agent
              name: consolidation-analyst-agent
            input: |
              Read the consolidated KYC profile from:
              /data/{{inputs.parameters.output-dir}}/kyc_profile.json
              
              Convert to a comprehensive Markdown document with the following structure:
              
              # Customer Profile
              
              ## 1. Inquiry Information
              [Content from inquiry_information]
              
              ## 2. Initial Profile
              [Content from initial_profile]
              
              ## 3. Requirements and KYC Standards
              [Content from requirements_and_standards]
              
              ## 4. Affiliates
              
              ### 4.1 Ownership Structure: Entities/Vessels
              [Use table format with columns: Entity/Vessel Name, Type, Ownership %, Jurisdiction]
              
              ### 4.2 Ownership Structure: Beneficial Owners
              [Use table format with columns: Name, Ownership %, Nationality, Role]
              
              ### 4.3 Key Controllers
              [Use table format with columns: Name, Position, Control Type, Nationality]
              
              ## 5. Screening
              
              ### 5.1 Adverse Media Screening
              
              #### Summary
              [2-3 sentence executive summary from bank's perspective]
              
              [Use table format with columns: Topic, Relevance, Source]
              
              ### 5.2 Blacklist Screening
              [Use table format with columns: List Name, Match Status, Details]
              
              ### 5.3 Sanction Screening
              [Use table format with columns: Sanctions List, Match Status, Details]
              
              ## 6. Purpose of Relationship
              [Content from purpose_of_relationship]
              
              Formatting requirements:
              - Use table format for: Company Details, Basic Information, Active Officers, Affiliates, Screening
              - For missing sections, write "No information available" below the section title
              - Use appropriate headers (##, ###, ####)
              - Ensure all tables are properly formatted
              
              Save the Markdown document using 'mcp-filesystem-write-file' to:
              /data/{{inputs.parameters.output-dir}}/kyc_profile.md
            timeout: 8m
