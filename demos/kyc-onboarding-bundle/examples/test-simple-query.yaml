# Simple test query to verify agent and model are working
apiVersion: ark.mckinsey.com/v1alpha1
kind: Query
metadata:
  generateName: test-agent-
spec:
  # Use a simple agent that's deployed
  target:
    type: agent
    name: consolidation-analyst-agent
  
  # Simple test prompt
  input: |
    You are a KYC analyst. Please explain in 3-4 sentences what information 
    you would need to perform customer due diligence on a new business client.
  
  # Wait up to 2 minutes
  timeout: 2m
