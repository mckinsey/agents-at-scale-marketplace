{{- if .Values.argoWorkflows.workflowTemplate.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lx-blacklist-sanction-screening
  labels:
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    workflows.argoproj.io/title: "Phase II - Customer Due Diligence - 2b/2c. Blacklist and Sanctions Screening"
    workflows.argoproj.io/description: "Screen beneficial owners and key controllers against blacklists and UK sanctions list"
    workflows.argoproj.io/version: "v0.0.1"
    workflows.argoproj.io/migrated-from: "legacyx"
spec:
  entrypoint: main
  serviceAccountName: {{ .Release.Name }}-{{ .Values.argoWorkflows.serviceAccount.name }}

  volumes:
    - name: mcp-filesystem-volume
      hostPath:
        path: /mnt/output
        type: DirectoryOrCreate

  arguments:
    parameters:
      - name: output-base-dir
        value: "source_code_files/2-customer-due-diligence"
      - name: execution-mode
        value: "sequential"
        enum:
          - sequential
          - parallel

  templates:
    # ============================================================
    # MAIN WORKFLOW
    # ============================================================
    - name: main
      inputs:
        parameters:
          - name: output-base-dir
            value: "{{ "{{workflow.parameters.output-base-dir}}" }}"
          - name: execution-mode
            value: "{{ "{{workflow.parameters.execution-mode}}" }}"
      steps:
        # Step 0: Ensure output directories exist
        - - name: ensure-output-dirs
            template: ensure-output-dirs-script
            arguments:
              parameters:
                - name: output-base-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}"

        # Step 1: Load UK sanctions list
        - - name: load-sanctions-list
            template: load-uk-sanctions-list
            arguments:
              parameters:
                - name: output-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/downloads/uk_sanctions_list.txt"

        # Step 2: Create screening list from multiple sources
        - - name: create-screening-list
            template: create-screening-list-query
            arguments:
              parameters:
                - name: owners-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/profile_sections/beneficial_ownership_tree.json"
                - name: key-controllers-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/profile_sections/key_controllers.json"
                - name: entities-vessels-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/profile_sections/entities_vessels.json"
                - name: output-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/tmp/screening_list.yaml"

        # Step 3: Parse screening list to get names
        - - name: get-key-controller-names
            template: read-yaml-to-list
            arguments:
              parameters:
                - name: yaml-file-path
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/tmp/screening_list.yaml"
                - name: section
                  value: "key_controllers"

        # Step 4: Blacklist screening (conditional execution)
        - - name: blacklist-screening-sequential
            when: "{{ "{{inputs.parameters.execution-mode}}" }} == sequential"
            template: blacklist-screening-sequential
            arguments:
              parameters:
                - name: names-json
                  value: "{{ "{{steps.get-key-controller-names.outputs.parameters.names-list}}" }}"
                - name: blacklist-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/input/mock-up-blacklist.json"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/screening/blacklist_report"

          - name: blacklist-screening-parallel
            when: "{{ "{{inputs.parameters.execution-mode}}" }} == parallel"
            template: blacklist-screening-parallel
            arguments:
              parameters:
                - name: names-json
                  value: "{{ "{{steps.get-key-controller-names.outputs.parameters.names-list}}" }}"
                - name: blacklist-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/input/mock-up-blacklist.json"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/screening/blacklist_report"

        # Step 5: Read blacklist JSON directory
        - - name: read-blacklist-json-directory
            template: readdir-script
            arguments:
              parameters:
                - name: base-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/screening/blacklist_report"

        # Step 6: Combine blacklist files
        - - name: append-blacklist-files
            template: combine-json
            arguments:
              parameters:
                - name: file-paths-json
                  value: "{{ "{{steps.read-blacklist-json-directory.outputs.parameters.file-paths}}" }}"
                - name: output-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/screening/blacklist.json"

        # Step 7: Sanction list screening (conditional execution)
        - - name: sanction-list-screening-sequential
            when: "{{ "{{inputs.parameters.execution-mode}}" }} == sequential"
            template: sanction-list-screening-sequential
            arguments:
              parameters:
                - name: names-json
                  value: "{{ "{{steps.get-key-controller-names.outputs.parameters.names-list}}" }}"
                - name: sanctions-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/downloads/uk_sanctions_list.txt"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/screening/sanction_report"

          - name: sanction-list-screening-parallel
            when: "{{ "{{inputs.parameters.execution-mode}}" }} == parallel"
            template: sanction-list-screening-parallel
            arguments:
              parameters:
                - name: names-json
                  value: "{{ "{{steps.get-key-controller-names.outputs.parameters.names-list}}" }}"
                - name: sanctions-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/downloads/uk_sanctions_list.txt"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/screening/sanction_report"

        # Step 8: Read sanction list JSON directory
        - - name: read-sanction-list-json-directory
            template: readdir-script
            arguments:
              parameters:
                - name: base-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/screening/sanction_report"

        # Step 9: Combine sanction list files
        - - name: append-sanction-list-files
            template: combine-json
            arguments:
              parameters:
                - name: file-paths-json
                  value: "{{ "{{steps.read-sanction-list-json-directory.outputs.parameters.file-paths}}" }}"
                - name: output-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/screening/sanction_list.json"

        # Step 10: Get current date
        - - name: get-current-date
            template: get-current-date-script

        # Step 11: Summarize screening results
        - - name: summarize-screening-results
            template: summarize-sanctions-query
            arguments:
              parameters:
                - name: blacklist-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/screening/blacklist.json"
                - name: sanction-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/screening/sanction_list.json"
                - name: json-output-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/profile_sections/sanction_blacklist_screening.json"
                - name: md-output-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/output/sanction_blacklist_screening_report.md"
                - name: current-date
                  value: "{{ "{{steps.get-current-date.outputs.parameters.current-date}}" }}"

    # ============================================================
    # UTILITY TEMPLATES
    # ============================================================

    - name: ensure-output-dirs-script
      inputs:
        parameters:
          - name: output-base-dir
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          BASE="{{ "{{inputs.parameters.output-base-dir}}" }}"
          MCP_DATA="/data/aas-files"
          for dir in "$BASE/downloads" "$BASE/tmp" "$BASE/screening/blacklist_report" "$BASE/screening/sanction_report" "$BASE/profile_sections" "$BASE/output"; do
            kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- mkdir -p "$MCP_DATA/$dir"
          done
          echo "Created output directories"

    # Get current date
    - name: get-current-date-script
      script:
        image: alpine:latest
        command: [sh]
        source: |
          date +%Y-%m-%d > /tmp/current_date.txt
          cat /tmp/current_date.txt
      outputs:
        parameters:
          - name: current-date
            valueFrom:
              path: /tmp/current_date.txt

    # Load UK sanctions list
    - name: load-uk-sanctions-list
      inputs:
        parameters:
          - name: output-file
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          apk add --no-cache curl

          MCP_DATA="/data/aas-files"
          OUTPUT_FILE="$MCP_DATA/{{ "{{inputs.parameters.output-file}}" }}"

          # Create output directory
          kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- mkdir -p "$(dirname $OUTPUT_FILE)"

          # Download UK sanctions list
          curl -L "https://www.gov.uk/government/publications/financial-sanctions-consolidated-list-of-targets/consolidated-list-of-targets" \
            -o /tmp/uk_sanctions_list.txt

          # Use kubectl to copy to mcp-filesystem
          kubectl exec -i deployment/{{ .Values.filesystemMcpDeployment }} -- tee "$OUTPUT_FILE" < /tmp/uk_sanctions_list.txt > /dev/null

          echo "Downloaded UK sanctions list to $OUTPUT_FILE"

    # ARK Query: Create screening list from multiple sources
    - name: create-screening-list-query
      retryStrategy:
        limit: 2
        retryPolicy: "Always"
        backoff:
          duration: "30s"
          factor: 2
      inputs:
        parameters:
          - name: owners-file
          - name: key-controllers-file
          - name: entities-vessels-file
          - name: output-file
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: screening-list-
          spec:
            target:
              type: agent
              name: consolidation-analyst-agent
            input: |
              Read the following files using `mcp-filesystem-read-file`:
              - Key controllers: {{ "{{inputs.parameters.key-controllers-file}}" }}
              Do NOT add /data or any other prefix to file paths when using MCP tools.

              Extract ONLY individual person names from the key controllers file.
              From "Board of Directors": extract all board member names.
              From "Board of Management": extract all management role names.

              IMPORTANT: Only include PERSON names. Do NOT include:
              - Company names or subsidiary entities
              - Investment vehicles or trusts
              - Any non-person entries

              Deduplicate: if the same person appears in both Board of Directors and Board of Management, include them only ONCE.

              Create a YAML file with a list of names to screen in the following format:

              key_controllers:
                - name: "Person Name 1"
                - name: "Person Name 2"

              Save the YAML file to: {{ "{{inputs.parameters.output-file}}" }}
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'

    # Read YAML file and convert to list
    - name: read-yaml-to-list
      inputs:
        parameters:
          - name: yaml-file-path
          - name: section
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          MCP_DATA="/data/aas-files"
          YAML_FILE="$MCP_DATA/{{ "{{inputs.parameters.yaml-file-path}}" }}"
          SECTION="{{ "{{inputs.parameters.section}}" }}"

          # Use kubectl exec to read file via mcp-filesystem
          NAMES_JSON=$(kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- cat "$YAML_FILE" | yq eval ".${SECTION}" -o=json)

          echo "$NAMES_JSON" > /tmp/names.json
          cat /tmp/names.json
      outputs:
        parameters:
          - name: names-list
            valueFrom:
              path: /tmp/names.json

    # Blacklist screening sequential
    - name: blacklist-screening-sequential
      inputs:
        parameters:
          - name: names-json
          - name: blacklist-file
          - name: output-dir
      steps:
        - - name: screen-name
            template: screening-in-document-query
            arguments:
              parameters:
                - name: name
                  value: "{{ "{{item.name}}" }}"
                - name: document-file
                  value: "{{ "{{inputs.parameters.blacklist-file}}" }}"
                - name: screening-type
                  value: "blacklist"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-dir}}" }}"
            withParam: "{{ "{{inputs.parameters.names-json}}" }}"

    # Blacklist screening parallel
    - name: blacklist-screening-parallel
      inputs:
        parameters:
          - name: names-json
          - name: blacklist-file
          - name: output-dir
      steps:
        - - name: screen-all-names
            template: screening-in-document-query
            arguments:
              parameters:
                - name: name
                  value: "{{ "{{item.name}}" }}"
                - name: document-file
                  value: "{{ "{{inputs.parameters.blacklist-file}}" }}"
                - name: screening-type
                  value: "blacklist"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-dir}}" }}"
            withParam: "{{ "{{inputs.parameters.names-json}}" }}"

    # Sanction list screening sequential
    - name: sanction-list-screening-sequential
      inputs:
        parameters:
          - name: names-json
          - name: sanctions-file
          - name: output-dir
      steps:
        - - name: screen-name
            template: screening-in-document-query
            arguments:
              parameters:
                - name: name
                  value: "{{ "{{item.name}}" }}"
                - name: document-file
                  value: "{{ "{{inputs.parameters.sanctions-file}}" }}"
                - name: screening-type
                  value: "sanction list"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-dir}}" }}"
            withParam: "{{ "{{inputs.parameters.names-json}}" }}"

    # Sanction list screening parallel
    - name: sanction-list-screening-parallel
      inputs:
        parameters:
          - name: names-json
          - name: sanctions-file
          - name: output-dir
      steps:
        - - name: screen-all-names
            template: screening-in-document-query
            arguments:
              parameters:
                - name: name
                  value: "{{ "{{item.name}}" }}"
                - name: document-file
                  value: "{{ "{{inputs.parameters.sanctions-file}}" }}"
                - name: screening-type
                  value: "sanction list"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-dir}}" }}"
            withParam: "{{ "{{inputs.parameters.names-json}}" }}"

    # ARK Query: Screen name in document (uses filesystem read, not PDF tools)
    - name: screening-in-document-query
      retryStrategy:
        limit: 2
        retryPolicy: "Always"
        backoff:
          duration: "30s"
          factor: 2
      inputs:
        parameters:
          - name: name
          - name: document-file
          - name: screening-type
          - name: output-dir
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: screen-
          spec:
            target:
              type: agent
              name: consolidation-analyst-agent
            input: |
              Name to screen: {{ "{{inputs.parameters.name}}" }}
              Screening type: {{ "{{inputs.parameters.screening-type}}" }}

              Read the {{ "{{inputs.parameters.screening-type}}" }} file using the `mcp-filesystem-read-file` tool at path: {{ "{{inputs.parameters.document-file}}" }}
              Do NOT add /data or any other prefix to the path.

              Search for "{{ "{{inputs.parameters.name}}" }}" in the file content.
              Check if the name (or close variations) appears in the {{ "{{inputs.parameters.screening-type}}" }}.

              Also read the key controllers file to get the person's role, nationality, and country of residence:
              source_code_files/2-customer-due-diligence/profile_sections/key_controllers.json

              The JSON MUST follow this exact LegacyX format:
              {
                "name": "{{ "{{inputs.parameters.name}}" }}",
                "screening_type": "{{ "{{inputs.parameters.screening-type}}" }}",
                "role": "<role from key_controllers.json, e.g. Director, Chairman, CEO>",
                "nationality": "<nationality from key_controllers.json, or 'not available'>",
                "country_of_residency": "<country_of_residence from key_controllers.json, or 'not available'>",
                "type": "key controller",
                "{{ "{{inputs.parameters.screening-type}}" }} screening": {
                  "status": "not on {{ "{{inputs.parameters.screening-type}}" }}",
                  "confidence score": "10",
                  "justification": "<brief explanation of screening result>"
                }
              }

              Screening status rules:
              - "not on {{ "{{inputs.parameters.screening-type}}" }}": No match found (confidence score: 10)
              - "possible match": Similar name found but not exact (confidence score: 3-7, explain the similarity)
              - "on {{ "{{inputs.parameters.screening-type}}" }}": Exact match found (confidence score: 10)

              Calculate the hash of the name using MD5 for the filename.
              Save the result to: {{ "{{inputs.parameters.output-dir}}" }}/[name_hash].json
              Do NOT add /data or any other prefix to the path.
            timeout: 15m
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'

    # Read directory and return file paths
    - name: readdir-script
      inputs:
        parameters:
          - name: base-dir
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          MCP_DATA="/data/aas-files"
          BASE_DIR="{{ "{{inputs.parameters.base-dir}}" }}"

          # Use kubectl exec to find files via mcp-filesystem (paths under MCP base)
          FILES=$(kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- find "$MCP_DATA/$BASE_DIR" -type f -name "*.json" 2>/dev/null || echo "[]")

          if [ "$FILES" = "[]" ] || [ -z "$FILES" ]; then
            echo "[]" > /tmp/file_paths.json
          else
            # Return paths relative to MCP base (so combine-json can cat $MCP_DATA/$file)
            echo "$FILES" | sed "s|^$MCP_DATA/||g" | jq -R -s -c 'split("\n") | map(select(length > 0))' > /tmp/file_paths.json
          fi

          cat /tmp/file_paths.json
      outputs:
        parameters:
          - name: file-paths
            valueFrom:
              path: /tmp/file_paths.json

    # Combine JSON files
    - name: combine-json
      inputs:
        parameters:
          - name: file-paths-json
          - name: output-file
          - name: wrapper-key
            default: ""
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          MCP_DATA="/data/aas-files"
          FILE_PATHS='{{ "{{inputs.parameters.file-paths-json}}" }}'
          OUTFILE="$MCP_DATA/{{ "{{inputs.parameters.output-file}}" }}"
          WRAPPER_KEY='{{ "{{inputs.parameters.wrapper-key}}" }}'

          # Create output directory
          kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- mkdir -p "$(dirname $OUTFILE)"

          # Combine all JSON files using kubectl exec
          COMBINED="[]"
          for file in $(echo "$FILE_PATHS" | jq -r '.[]'); do
            CONTENT=$(kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- cat "$MCP_DATA/$file" 2>/dev/null || echo '{}')
            COMBINED=$(echo "$COMBINED" | jq ". += [$CONTENT]")
          done

          # Wrap in key if specified
          if [ -n "$WRAPPER_KEY" ]; then
            COMBINED=$(echo "$COMBINED" | jq "{\"$WRAPPER_KEY\": .}")
          fi

          # Write combined JSON
          echo "$COMBINED" | kubectl exec -i deployment/{{ .Values.filesystemMcpDeployment }} -- tee "$OUTFILE" > /dev/null

          echo "Combined $(echo $FILE_PATHS | jq 'length') files into $OUTFILE"

    # ARK Query: Summarize sanctions screening results
    - name: summarize-sanctions-query
      inputs:
        parameters:
          - name: blacklist-file
          - name: sanction-file
          - name: json-output-file
          - name: md-output-file
          - name: current-date
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: summarize-sanctions-
          spec:
            target:
              type: agent
              name: consolidation-analyst-agent
            input: |
              Current date: {{ "{{inputs.parameters.current-date}}" }}

              STEP 1 - READ FILES: You MUST use the `mcp-filesystem-read-file` tool to read BOTH of these files. Do NOT skip this step. Do NOT add /data or any other prefix to file paths.
              - Blacklist screening results: {{ "{{inputs.parameters.blacklist-file}}" }}
              - Sanctions screening results: {{ "{{inputs.parameters.sanction-file}}" }}

              STEP 2 - PROCESS: Parse each file. Each file contains a JSON array of individual screening results. For each person/entity in the screening results, extract their name, role, nationality, country of residency, screening status, confidence score, and justification.

              STEP 3 - CREATE OUTPUTS:

              1. A JSON file in this exact LegacyX format:
              {
                "screening": [
                  {
                    "subsection": "Internal blacklist screening",
                    "content": {
                      "PersonName1": [
                        {
                          "role": "<role>",
                          "nationality": "<nationality>",
                          "country_of_residency": "<country>",
                          "type": "key controller",
                          "blacklist screening": {
                            "status": "not on blacklist",
                            "confidence score": "10",
                            "justification": "<explanation>"
                          }
                        }
                      ],
                      "PersonName2": [...]
                    }
                  },
                  {
                    "subsection": "Sanction screening",
                    "content": {
                      "PersonName1": [
                        {
                          "role": "<role>",
                          "nationality": "<nationality>",
                          "country_of_residency": "<country>",
                          "type": "key controller",
                          "sanction_list_screening": {
                            "status": "not on sanction list",
                            "confidence score": "10",
                            "justification": "<explanation>"
                          }
                        }
                      ],
                      "PersonName2": [...]
                    }
                  }
                ]
              }

              CRITICAL: The top-level key MUST be "screening". Group all blacklist results under "Internal blacklist screening" subsection and all sanction results under "Sanction screening" subsection. Each person's results should be keyed by their name in the "content" object.
              IMPORTANT: Every person from the screening input files MUST appear in BOTH subsections. Do NOT return an empty or partial result.

              You MUST use the `mcp-filesystem-write-file` tool to save the JSON to: {{ "{{inputs.parameters.json-output-file}}" }}
              Do NOT add /data or any other prefix to the path.

              2. Also create a Markdown report with this EXACT structure:

              # Blacklist and UK Sanction List Screening Report
              _<current date>_

              ## Summary: Blacklist
              - Individuals on list: <count or "None">
              - Entities/vessels on list: <count or "None">
              - Possible matches:
                - **<name>** - <justification> - _Confidence_ **<span style="color: orange"><score></span>**
                (or "None" if no possible matches)

              ## Summary: UK Sanction list
              - Individuals on list: <count or "None">
              - Entities/vessels on list: <count or "None">
              - Possible matches: <count or "None">

              ## Details
              #### Key controllers
              For each person, list:
              - <Name> (<nationality>, <country_of_residence>)
                - **<span style="color: green">not on blacklist</span>** - <justification> - _Confidence_ **<span style="color: green"><score></span>**
                - **<span style="color: green">not on sanction list</span>** - <justification> - _Confidence_ **<span style="color: green"><score></span>**

              Use green for "not on" statuses, orange for "possible match", red for "on list".

              #### Beneficial owners
              - None (or list if any)

              #### Entities and vessels
              - None (or list if any)

              You MUST use the `mcp-filesystem-write-file` tool to save the Markdown to: {{ "{{inputs.parameters.md-output-file}}" }}
              Do NOT add /data or any other prefix to the path.

              After saving both files, confirm the files were written successfully.
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
{{- end }}
