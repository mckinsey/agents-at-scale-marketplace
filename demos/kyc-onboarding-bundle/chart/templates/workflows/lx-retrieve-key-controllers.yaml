{{- if .Values.argoWorkflows.workflowTemplate.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lx-retrieve-key-controllers
  labels:
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    workflows.argoproj.io/title: "Phase II - Customer Due Diligence - 1c. Key Controllers"
    workflows.argoproj.io/description: "Retrieve key controllers (Board of Directors and Management) from annual reports and web sources"
    workflows.argoproj.io/version: "v0.0.1"
    workflows.argoproj.io/migrated-from: "legacyx"
spec:
  entrypoint: main
  serviceAccountName: {{ .Release.Name }}-{{ .Values.argoWorkflows.serviceAccount.name }}

  volumes:
    - name: mcp-filesystem-volume
      hostPath:
        path: /mnt/output
        type: DirectoryOrCreate

  arguments:
    parameters:
      - name: company-name
        value: "ASSOCIATED BRITISH FOODS PLC"
      - name: document-file
        value: "/data/aas-files/source_code_files/2-customer-due-diligence/input/abf-annual-report-2024.pdf"
      - name: output-base-dir
        value: "source_code_files/2-customer-due-diligence"
      - name: execution-mode
        value: "sequential"
        enum:
          - sequential
          - parallel

  templates:
    # ============================================================
    # MAIN WORKFLOW
    # ============================================================
    - name: main
      inputs:
        parameters:
          - name: company-name
            value: "{{ "{{workflow.parameters.company-name}}" }}"
          - name: document-file
            value: "{{ "{{workflow.parameters.document-file}}" }}"
          - name: output-base-dir
            value: "{{ "{{workflow.parameters.output-base-dir}}" }}"
          - name: execution-mode
            value: "{{ "{{workflow.parameters.execution-mode}}" }}"
      steps:
        # Step 0: Ensure output directories exist
        - - name: ensure-output-dirs
            template: ensure-output-dirs-script
            arguments:
              parameters:
                - name: output-base-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}"

        # Step 1: Get current date
        - - name: get-current-date
            template: get-current-date-script

        # Step 2: Get key controllers prompts from YAML
        - - name: get-key-controllers-prompts
            template: read-prompts-file
            arguments:
              parameters:
                - name: prompts-file-path
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/input/prompts_key_controllers.yml"

        # Step 3: Collect information from annual report (conditional execution)
        - - name: collect-info-sequential
            when: "{{ "{{inputs.parameters.execution-mode}}" }} == sequential"
            template: collect-info-sequential
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{ "{{steps.get-key-controllers-prompts.outputs.parameters.prompts-list}}" }}"
                - name: document-file
                  value: "{{ "{{inputs.parameters.document-file}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/intermediate/key_controllers"
                - name: current-date
                  value: "{{ "{{steps.get-current-date.outputs.parameters.current-date}}" }}"

          - name: collect-info-parallel
            when: "{{ "{{inputs.parameters.execution-mode}}" }} == parallel"
            template: collect-info-parallel
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{ "{{steps.get-key-controllers-prompts.outputs.parameters.prompts-list}}" }}"
                - name: document-file
                  value: "{{ "{{inputs.parameters.document-file}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/intermediate/key_controllers"
                - name: current-date
                  value: "{{ "{{steps.get-current-date.outputs.parameters.current-date}}" }}"

        # Step 4: Collect web data (conditional execution)
        - - name: collect-web-data-sequential
            when: "{{ "{{inputs.parameters.execution-mode}}" }} == sequential"
            template: collect-web-data-sequential
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{ "{{steps.get-key-controllers-prompts.outputs.parameters.prompts-list}}" }}"
                - name: company-name
                  value: "{{ "{{inputs.parameters.company-name}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/intermediate/key_controllers"
                - name: current-date
                  value: "{{ "{{steps.get-current-date.outputs.parameters.current-date}}" }}"

          - name: collect-web-data-parallel
            when: "{{ "{{inputs.parameters.execution-mode}}" }} == parallel"
            template: collect-web-data-parallel
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{ "{{steps.get-key-controllers-prompts.outputs.parameters.prompts-list}}" }}"
                - name: company-name
                  value: "{{ "{{inputs.parameters.company-name}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/intermediate/key_controllers"
                - name: current-date
                  value: "{{ "{{steps.get-current-date.outputs.parameters.current-date}}" }}"

        # Step 5: Read JSON files from directory
        - - name: read-info-json-directory
            template: readdir-script
            arguments:
              parameters:
                - name: base-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/intermediate/key_controllers"

        # Step 6: Combine JSON files
        - - name: append-info-files
            template: combine-json
            arguments:
              parameters:
                - name: file-paths-json
                  value: "{{ "{{steps.read-info-json-directory.outputs.parameters.file-paths}}" }}"
                - name: output-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/intermediate/tmp/key_controllers_unconsolidated.json"

        # Step 7: Consolidate information (LLM-based — merges sources, deduplicates, enforces schema)
        - - name: consolidate-information
            template: consolidate-key-controllers-query
            arguments:
              parameters:
                - name: company-name
                  value: "{{ "{{inputs.parameters.company-name}}" }}"
                - name: input-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/intermediate/tmp/key_controllers_unconsolidated.json"
                - name: profile-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/input/kyc_profile.json"
                - name: output-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/profile_sections/key_controllers.json"

    # ============================================================
    # UTILITY TEMPLATES
    # ============================================================

    - name: ensure-output-dirs-script
      inputs:
        parameters:
          - name: output-base-dir
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          BASE="{{ "{{inputs.parameters.output-base-dir}}" }}"
          MCP_DATA="/data/aas-files"
          for dir in "$BASE/intermediate/key_controllers" "$BASE/intermediate/tmp" "$BASE/profile_sections"; do
            kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- mkdir -p "$MCP_DATA/$dir"
          done
          echo "Created output directories"

    # Get current date
    - name: get-current-date-script
      script:
        image: alpine:latest
        command: [sh]
        source: |
          date +%Y-%m-%d > /tmp/current_date.txt
          cat /tmp/current_date.txt
      outputs:
        parameters:
          - name: current-date
            valueFrom:
              path: /tmp/current_date.txt

    # Read prompts from YAML file
    - name: read-prompts-file
      inputs:
        parameters:
          - name: prompts-file-path
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          MCP_DATA="/data/aas-files"
          PROMPTS_FILE="$MCP_DATA/{{ "{{inputs.parameters.prompts-file-path}}" }}"

          # Use kubectl exec to read file via mcp-filesystem and convert to array format
          kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- cat "$PROMPTS_FILE" | yq eval -o=json '.' | jq '
            to_entries[0].value |
            to_entries | map({
              section: .key,
              prompt: .value.objective
            })
          ' > /tmp/prompts.json

          cat /tmp/prompts.json

      outputs:
        parameters:
          - name: prompts-list
            valueFrom:
              path: /tmp/prompts.json

    # Collect information sequentially
    - name: collect-info-sequential
      inputs:
        parameters:
          - name: prompts-json
          - name: document-file
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-prompt
            template: doc-extract-query
            continueOn:
              failed: true
            arguments:
              parameters:
                - name: prompt
                  value: "{{ "{{item.prompt}}" }}"
                - name: section
                  value: "{{ "{{item.section}}" }}"
                - name: document-file
                  value: "{{ "{{inputs.parameters.document-file}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-dir}}" }}"
                - name: current-date
                  value: "{{ "{{inputs.parameters.current-date}}" }}"
            withParam: "{{ "{{inputs.parameters.prompts-json}}" }}"

    # Collect information in parallel
    - name: collect-info-parallel
      inputs:
        parameters:
          - name: prompts-json
          - name: document-file
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-all-prompts
            template: doc-extract-query
            continueOn:
              failed: true
            arguments:
              parameters:
                - name: prompt
                  value: "{{ "{{item.prompt}}" }}"
                - name: section
                  value: "{{ "{{item.section}}" }}"
                - name: document-file
                  value: "{{ "{{inputs.parameters.document-file}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-dir}}" }}"
                - name: current-date
                  value: "{{ "{{inputs.parameters.current-date}}" }}"
            withParam: "{{ "{{inputs.parameters.prompts-json}}" }}"

    # Collect web data sequentially
    - name: collect-web-data-sequential
      inputs:
        parameters:
          - name: prompts-json
          - name: company-name
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-web-prompt
            template: web-data-query
            continueOn:
              failed: true
            arguments:
              parameters:
                - name: prompt
                  value: "{{ "{{item.prompt}}" }}"
                - name: section
                  value: "{{ "{{item.section}}" }}"
                - name: company-name
                  value: "{{ "{{inputs.parameters.company-name}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-dir}}" }}"
                - name: current-date
                  value: "{{ "{{inputs.parameters.current-date}}" }}"
            withParam: "{{ "{{inputs.parameters.prompts-json}}" }}"

    # Collect web data in parallel
    - name: collect-web-data-parallel
      inputs:
        parameters:
          - name: prompts-json
          - name: company-name
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-all-web-prompts
            template: web-data-query
            continueOn:
              failed: true
            arguments:
              parameters:
                - name: prompt
                  value: "{{ "{{item.prompt}}" }}"
                - name: section
                  value: "{{ "{{item.section}}" }}"
                - name: company-name
                  value: "{{ "{{inputs.parameters.company-name}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-dir}}" }}"
                - name: current-date
                  value: "{{ "{{inputs.parameters.current-date}}" }}"
            withParam: "{{ "{{inputs.parameters.prompts-json}}" }}"

    # ARK Query: Extract information from document using RAG agent
    - name: doc-extract-query
      retryStrategy:
        limit: 2
        retryPolicy: "Always"
        backoff:
          duration: "30s"
          factor: 2
      inputs:
        parameters:
          - name: prompt
          - name: section
          - name: document-file
          - name: output-dir
          - name: current-date
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: doc-extract-
          spec:
            target:
              type: agent
              name: rag-agent
            input: |
              Current date: {{ "{{inputs.parameters.current-date}}" }}

              **CRITICAL: Use pdf-extraction-mcp tools to analyze the PDF. Do NOT use filesystem-mcp-server-read-file on the PDF — it is too large.**

              Step 1 — Extract: Use the pdf-extraction-mcp-extract-pdf-sections tool with these parameters:
              - pdf_path: "{{ "{{inputs.parameters.document-file}}" }}"
              - search_terms: ["director", "chairman", "board", "appointed", "independent", "non-executive", "executive", "officer", "committee", "senior management", "governance"]
              - extraction_prompt: "Extract ALL board members and key management personnel. For each person include: full name (as printed in the document), role/title, appointment date, nationality, date of birth, country of residence, independence status (independent/non-independent/executive), tenure, and any committee memberships. Return JSON: {\"board_members\": [{\"name\": \"...\", \"role\": \"...\", \"appointed_on\": \"...\", \"nationality\": \"...\", \"date_of_birth\": \"...\", \"country_of_residence\": \"...\", \"independence_status\": \"...\", \"tenure\": \"...\"}], \"management_roles\": [{\"name\": \"...\", \"role\": \"...\"}]}"

              Step 2 — Answer this question using the extracted data:
              {{ "{{inputs.parameters.prompt}}" }}

              Important: Only include ACTIVE members. Exclude anyone who has resigned, stepped down, or whose tenure has ended.

              Step 3 — Save the extracted information as a JSON file using filesystem-mcp-server-write-file.
              Save to: {{ "{{inputs.parameters.output-dir}}" }}/{{ "{{inputs.parameters.section}}" }}.json
              Do NOT add /data or any other prefix to the path.

              The JSON structure should follow this format:
              {
                "section": "{{ "{{inputs.parameters.section}}" }}",
                "prompt": "{{ "{{inputs.parameters.prompt}}" }}",
                "data": {
                  "board_members": [
                    {
                      "name": "<full name>",
                      "role": "<role/title>",
                      "appointed_on": "<YYYY-MM-DD>",
                      "nationality": "<nationality>",
                      "date_of_birth": "<birth info>",
                      "country_of_residence": "<country>",
                      "independence_status": "<independent|not independent|executive>",
                      "tenure": "<tenure info>",
                      "source": ["<[document name](document path)>"],
                      "source_reliability_score": ["high"],
                      "source_reliability_rationale": ["The source is the official annual report."]
                    }
                  ],
                  "management_roles": [
                    {
                      "name": "<full name>",
                      "role": "<role>",
                      "source": ["<[document name](document path)>"],
                      "source_reliability_score": ["high"],
                      "source_reliability_rationale": ["The source is the official annual report."]
                    }
                  ]
                },
                "sources": [<list_of_sources_with_page_numbers>]
              }
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'

    # ARK Query: Collect web data using web enricher agent
    - name: web-data-query
      retryStrategy:
        limit: 2
        retryPolicy: "Always"
        backoff:
          duration: "30s"
          factor: 2
      inputs:
        parameters:
          - name: prompt
          - name: section
          - name: company-name
          - name: output-dir
          - name: current-date
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: web-data-
          spec:
            target:
              type: team
              name: web-research-team
            input: |
              Current date: {{ "{{inputs.parameters.current-date}}" }}
              Company: {{ "{{inputs.parameters.company-name}}" }}

              {{ "{{inputs.parameters.prompt}}" }}

              Use the `web-research-mcp-research-ubo-web` tool to research information about the company.

              Important: Only include ACTIVE members. Exclude anyone who has resigned, stepped down, or whose tenure has ended.

              After collecting the information, assess the reliability of each source and assign a score using these rules:
              - high: Government and regulatory websites (e.g., Companies House, SEC, FCA), reputable news agencies (Reuters, Bloomberg, BBC, Financial Times), court records, audited corporate disclosures (annual reports, 10-K filings)
              - medium: Industry-specific publications, NGO reports, unaudited corporate disclosures (press releases), social media from verified accounts
              - low: Tabloid media, unverified social media, blogs, anonymous sources, outdated content

              Save the output to a JSON file using the `filesystem-write-file` tool.

              Save the output file to: {{ "{{inputs.parameters.output-dir}}" }}/web_{{ "{{inputs.parameters.section}}" }}.json
              Do NOT add /data or any other prefix to the path.

              The JSON structure should follow this format:
              {
                "section": "{{ "{{inputs.parameters.section}}" }}",
                "prompt": "{{ "{{inputs.parameters.prompt}}" }}",
                "company": "{{ "{{inputs.parameters.company-name}}" }}",
                "data": {
                  "board_members": [
                    {
                      "name": "<full name>",
                      "role": "<role/title>",
                      "appointed_on": "<YYYY-MM-DD>",
                      "nationality": "<nationality>",
                      "date_of_birth": "<birth info>",
                      "country_of_residence": "<country>",
                      "independence_status": "<independent|not independent|executive>",
                      "tenure": "<tenure info>",
                      "source": ["<[source name](url)>"],
                      "source_reliability_score": ["high|medium|low"],
                      "source_reliability_rationale": ["<rationale>"]
                    }
                  ],
                  "management_roles": [
                    {
                      "name": "<full name>",
                      "role": "<role>",
                      "source": ["<[source name](url)>"],
                      "source_reliability_score": ["high|medium|low"],
                      "source_reliability_rationale": ["<rationale>"]
                    }
                  ]
                },
                "sources": [<list_of_web_sources>]
              }
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'

    # Read directory and return file paths
    - name: readdir-script
      inputs:
        parameters:
          - name: base-dir
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          MCP_DATA="/data/aas-files"
          BASE_DIR="{{ "{{inputs.parameters.base-dir}}" }}"

          # Use kubectl exec to find files via mcp-filesystem (paths under MCP base)
          FILES=$(kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- find "$MCP_DATA/$BASE_DIR" -type f -name "*.json" 2>/dev/null || echo "[]")

          if [ "$FILES" = "[]" ] || [ -z "$FILES" ]; then
            echo "[]" > /tmp/file_paths.json
          else
            # Return paths relative to MCP base (so combine-json can cat $MCP_DATA/$file)
            echo "$FILES" | sed "s|^$MCP_DATA/||g" | jq -R -s -c 'split("\n") | map(select(length > 0))' > /tmp/file_paths.json
          fi

          cat /tmp/file_paths.json
      outputs:
        parameters:
          - name: file-paths
            valueFrom:
              path: /tmp/file_paths.json

    # Combine JSON files
    - name: combine-json
      inputs:
        parameters:
          - name: file-paths-json
          - name: output-file
          - name: wrapper-key
            default: ""
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          MCP_DATA="/data/aas-files"
          FILE_PATHS='{{ "{{inputs.parameters.file-paths-json}}" }}'
          OUTFILE="$MCP_DATA/{{ "{{inputs.parameters.output-file}}" }}"
          WRAPPER_KEY='{{ "{{inputs.parameters.wrapper-key}}" }}'

          # Create output directory
          kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- mkdir -p "$(dirname $OUTFILE)"

          # Combine all JSON files using kubectl exec
          COMBINED="[]"
          for file in $(echo "$FILE_PATHS" | jq -r '.[]'); do
            CONTENT=$(kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- cat "$MCP_DATA/$file" 2>/dev/null || echo '{}')
            COMBINED=$(echo "$COMBINED" | jq ". += [$CONTENT]")
          done

          # Wrap in key if specified
          if [ -n "$WRAPPER_KEY" ]; then
            COMBINED=$(echo "$COMBINED" | jq "{\"$WRAPPER_KEY\": .}")
          fi

          # Write combined JSON
          echo "$COMBINED" | kubectl exec -i deployment/{{ .Values.filesystemMcpDeployment }} -- tee "$OUTFILE" > /dev/null

          echo "Combined $(echo $FILE_PATHS | jq 'length') files into $OUTFILE"

    # DEPRECATED: Deterministic script consolidation — replaced by consolidate-key-controllers-query
    # Kept for reference; remove once LLM consolidation is validated
    - name: consolidate-key-controllers-script
      inputs:
        parameters:
          - name: intermediate-dir
          - name: output-file
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          MCP_DATA="/data/aas-files"
          INT_DIR="$MCP_DATA/{{ "{{inputs.parameters.intermediate-dir}}" }}"
          OUTPUT="$MCP_DATA/{{ "{{inputs.parameters.output-file}}" }}"

          # Get file list
          FILES=$(kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- find "$INT_DIR" -type f -name "*.json" 2>/dev/null)
          echo "Found files: $FILES"

          # Read each file and write to temp files, then slurp
          > /tmp/all_files.json
          for f in $FILES; do
            kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- cat "$f" 2>/dev/null >> /tmp/all_files.json
            echo "" >> /tmp/all_files.json
          done

          # Use jq slurp to combine (handles multiple JSON objects in one file)
          jq -s '.' /tmp/all_files.json > /tmp/raw.json 2>/dev/null || echo "[]" > /tmp/raw.json
          echo "Combined $(jq 'length' /tmp/raw.json) entries"

          # Extract board members
          jq -c '
            [.[] | select(.data != null) |
              if (.data | type) == "object" then
                (.data.board_members // [])[]
              elif (.data | type) == "array" then
                .data[] | select(.name != null)
              else empty end
            ] | unique_by(.name) | sort_by(.name)
          ' /tmp/raw.json > /tmp/board.json 2>/dev/null || echo "[]" > /tmp/board.json

          # Extract management roles
          jq -c '
            [.[] | select(.data != null) |
              if (.data | type) == "object" then
                (.data.management_roles // [])[]
              else empty end
            ] | unique_by(.name // .role) | sort_by(.name // .role)
          ' /tmp/raw.json > /tmp/mgmt.json 2>/dev/null || echo "[]" > /tmp/mgmt.json

          BOARD_COUNT=$(jq 'length' /tmp/board.json)
          MGMT_COUNT=$(jq 'length' /tmp/mgmt.json)
          echo "Found $BOARD_COUNT board members, $MGMT_COUNT management roles"

          # Build final JSON using file-based jq (avoids shell escaping issues)
          jq -n \
            --slurpfile board /tmp/board.json \
            --slurpfile mgmt /tmp/mgmt.json \
            '{
              "key_controllers": [
                {
                  "subsection": "Board of Directors",
                  "content": {
                    "board_members": $board[0]
                  }
                },
                {
                  "subsection": "Board of Management",
                  "content": {
                    "management_roles": $mgmt[0]
                  }
                }
              ]
            }' > /tmp/final.json

          kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- mkdir -p "$(dirname $OUTPUT)"
          cat /tmp/final.json | kubectl exec -i deployment/{{ .Values.filesystemMcpDeployment }} -- tee "$OUTPUT" > /dev/null
          echo "Wrote $BOARD_COUNT board members + $MGMT_COUNT mgmt roles to $OUTPUT"

    # ARK Query: Consolidate key controllers information (ACTIVE — used by Step 7)
    - name: consolidate-key-controllers-query
      retryStrategy:
        limit: 2
        retryPolicy: "Always"
        backoff:
          duration: "30s"
          factor: 2
      inputs:
        parameters:
          - name: company-name
          - name: input-file
          - name: profile-file
          - name: output-file
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: consolidate-kc-
          spec:
            target:
              type: agent
              name: consolidation-analyst-agent
            input: |
              Company: {{ "{{inputs.parameters.company-name}}" }}

              You are a KYC expert consolidating key controllers information from multiple sources.

              Step 1: Read the unconsolidated key controllers data from: {{ "{{inputs.parameters.input-file}}" }}
              Step 2: Read the existing customer profile data from: {{ "{{inputs.parameters.profile-file}}" }}
              Do NOT add /data or any other prefix to file paths when using MCP tools.

              Step 3: Consolidate following these rules:
              - Identify subsections with similar content from different sources and map to overarching subsections
              - The output must have exactly two subsections: "Board of Directors" and "Board of Management"
              - ONLY include ACTIVE members — exclude anyone who has resigned, stepped down, or whose tenure has ended
              - DEDUPLICATION (CRITICAL): Each person must appear EXACTLY ONCE in the board_members list. The same individual may appear in multiple source files under slightly different names (e.g., "Heather Rabbatts" vs "Heather Victoria Rabbatts", "Annie Murphy" vs "Anne Louise Murphy"). You MUST match these as the same person and merge their data into a single entry. When merging, prefer the full legal name from Companies House, combine all sources into one source array, and use the most complete data for each field. After building the final list, verify there are no duplicate names before saving.
              - If content is in conflict between sources, highlight the discrepancies
              - If multiple sources confirm content, include ALL sources in the source array
              - From the customer profile, extract information on key controllers (Directors, Managers, C-suite, executives) — this is very reliable and should be included
              - Use full legal names as they appear in official sources (e.g., Companies House)

              Step 4: Save the consolidated result to: {{ "{{inputs.parameters.output-file}}" }}

              The JSON MUST follow this exact LegacyX format:
