{{- if .Values.argoWorkflows.workflowTemplate.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lx-adverse-media-screening
  labels:
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    workflows.argoproj.io/title: "Phase II - Customer Due Diligence - 2a. Adverse Media Screening"
    workflows.argoproj.io/description: "Conduct adverse media screening via web research and classify relevance"
    workflows.argoproj.io/version: "v0.0.1"
    workflows.argoproj.io/migrated-from: "legacyx"
spec:
  entrypoint: main
  serviceAccountName: {{ .Release.Name }}-{{ .Values.argoWorkflows.serviceAccount.name }}

  volumes:
    - name: mcp-filesystem-volume
      hostPath:
        path: /mnt/output
        type: DirectoryOrCreate

  arguments:
    parameters:
      - name: company-name
        value: "ASSOCIATED BRITISH FOODS PLC"
      - name: output-base-dir
        value: "source_code_files/2-customer-due-diligence"
      - name: execution-mode
        value: "sequential"
        enum:
          - sequential
          - parallel

  templates:
    # ============================================================
    # MAIN WORKFLOW
    # ============================================================
    - name: main
      inputs:
        parameters:
          - name: company-name
            value: "{{ "{{workflow.parameters.company-name}}" }}"
          - name: output-base-dir
            value: "{{ "{{workflow.parameters.output-base-dir}}" }}"
          - name: execution-mode
            value: "{{ "{{workflow.parameters.execution-mode}}" }}"
      steps:
        # Step 0: Ensure output directories exist
        - - name: ensure-output-dirs
            template: ensure-output-dirs-script
            arguments:
              parameters:
                - name: output-base-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}"

        # Step 1: Get current date
        - - name: get-current-date
            template: get-current-date-script

        # Step 2: Get adverse media screening prompts from YAML
        - - name: get-adverse-media-prompts
            template: read-prompts-file
            arguments:
              parameters:
                - name: prompts-file-path
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/input/prompts_adverse_media_screening.yml"

        # Step 3: Conduct adverse media search (conditional execution)
        - - name: conduct-adverse-media-search-sequential
            when: "{{ "{{inputs.parameters.execution-mode}}" }} == sequential"
            template: collect-web-data-sequential
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{ "{{steps.get-adverse-media-prompts.outputs.parameters.prompts-list}}" }}"
                - name: company-name
                  value: "{{ "{{inputs.parameters.company-name}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/intermediate/adverse_media_screening"
                - name: current-date
                  value: "{{ "{{steps.get-current-date.outputs.parameters.current-date}}" }}"

          - name: conduct-adverse-media-search-parallel
            when: "{{ "{{inputs.parameters.execution-mode}}" }} == parallel"
            template: collect-web-data-parallel
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{ "{{steps.get-adverse-media-prompts.outputs.parameters.prompts-list}}" }}"
                - name: company-name
                  value: "{{ "{{inputs.parameters.company-name}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/intermediate/adverse_media_screening"
                - name: current-date
                  value: "{{ "{{steps.get-current-date.outputs.parameters.current-date}}" }}"

        # Step 4: Read adverse media JSON directory
        - - name: read-adverse-media-json-directory
            template: readdir-script
            arguments:
              parameters:
                - name: base-dir
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/intermediate/adverse_media_screening"

        # Step 5: Determine relevance for each file
        - - name: determine-relevance
            continueOn:
              failed: true
            template: relevance-classification-query
            arguments:
              parameters:
                - name: company-name
                  value: "{{ "{{inputs.parameters.company-name}}" }}"
                - name: file-path
                  value: "{{ "{{item}}" }}"
                - name: current-date
                  value: "{{ "{{steps.get-current-date.outputs.parameters.current-date}}" }}"
            withParam: "{{ "{{steps.read-adverse-media-json-directory.outputs.parameters.file-paths}}" }}"

        # Step 6: Combine JSON files
        - - name: append-info-files
            template: combine-json
            arguments:
              parameters:
                - name: file-paths-json
                  value: "{{ "{{steps.read-adverse-media-json-directory.outputs.parameters.file-paths}}" }}"
                - name: output-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/profile_sections/adverse_media_screening.json"
                - name: wrapper-key
                  value: "adverse_media_screening"

        # Step 7: Summarize adverse media screening
        - - name: summarize-adverse-media-screening
            template: summarize-adverse-media-query
            arguments:
              parameters:
                - name: input-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/profile_sections/adverse_media_screening.json"
                - name: output-file
                  value: "{{ "{{inputs.parameters.output-base-dir}}" }}/output/adverse_media_screening_summary.md"

    # ============================================================
    # UTILITY TEMPLATES
    # ============================================================

    - name: ensure-output-dirs-script
      inputs:
        parameters:
          - name: output-base-dir
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          BASE="{{ "{{inputs.parameters.output-base-dir}}" }}"
          MCP_DATA="/data/aas-files"
          for dir in "$BASE/intermediate/adverse_media_screening" "$BASE/profile_sections" "$BASE/output" "$BASE/screening"; do
            kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- mkdir -p "$MCP_DATA/$dir"
          done
          echo "Created output directories"

    # Get current date
    - name: get-current-date-script
      script:
        image: alpine:latest
        command: [sh]
        source: |
          date +%Y-%m-%d > /tmp/current_date.txt
          cat /tmp/current_date.txt
      outputs:
        parameters:
          - name: current-date
            valueFrom:
              path: /tmp/current_date.txt

    # Read prompts from YAML file
    - name: read-prompts-file
      inputs:
        parameters:
          - name: prompts-file-path
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          MCP_DATA="/data/aas-files"
          PROMPTS_FILE="$MCP_DATA/{{ "{{inputs.parameters.prompts-file-path}}" }}"

          # Use kubectl exec to read file via mcp-filesystem and convert to array format
          kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- cat "$PROMPTS_FILE" | yq eval -o=json '.' | jq '
            to_entries[0].value |
            to_entries | map({
              section: .key,
              prompt: .value.objective
            })
          ' > /tmp/prompts.json

          cat /tmp/prompts.json

      outputs:
        parameters:
          - name: prompts-list
            valueFrom:
              path: /tmp/prompts.json

    # Collect web data sequentially
    - name: collect-web-data-sequential
      inputs:
        parameters:
          - name: prompts-json
          - name: company-name
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-web-prompt
            template: web-data-query
            arguments:
              parameters:
                - name: prompt
                  value: "{{ "{{item.prompt}}" }}"
                - name: section
                  value: "{{ "{{item.section}}" }}"
                - name: company-name
                  value: "{{ "{{inputs.parameters.company-name}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-dir}}" }}"
                - name: current-date
                  value: "{{ "{{inputs.parameters.current-date}}" }}"
            withParam: "{{ "{{inputs.parameters.prompts-json}}" }}"

    # Collect web data in parallel
    - name: collect-web-data-parallel
      inputs:
        parameters:
          - name: prompts-json
          - name: company-name
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-all-web-prompts
            template: web-data-query
            arguments:
              parameters:
                - name: prompt
                  value: "{{ "{{item.prompt}}" }}"
                - name: section
                  value: "{{ "{{item.section}}" }}"
                - name: company-name
                  value: "{{ "{{inputs.parameters.company-name}}" }}"
                - name: output-dir
                  value: "{{ "{{inputs.parameters.output-dir}}" }}"
                - name: current-date
                  value: "{{ "{{inputs.parameters.current-date}}" }}"
            withParam: "{{ "{{inputs.parameters.prompts-json}}" }}"

    # ARK Query: Collect web data using web enricher agent
    - name: web-data-query
      retryStrategy:
        limit: 4
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: prompt
          - name: section
          - name: company-name
          - name: output-dir
          - name: current-date
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: web-data-
          spec:
            target:
              type: team
              name: web-research-team
            input: |
              Current date: {{ "{{inputs.parameters.current-date}}" }}
              Company: {{ "{{inputs.parameters.company-name}}" }}
              Section: {{ "{{inputs.parameters.section}}" }}

              Research Task:
              {{ "{{inputs.parameters.prompt}}" }}

              INSTRUCTIONS:
              1. Research adverse media information about the company using available web research tools:
                 - Use 'web-research-mcp-research-ubo-web' to search for information about the company
                 - Use 'web-research-mcp-get-web-research-results' to retrieve detailed results
                 - Use 'web-research-mcp-list-web-evidence' to find additional evidence
                 Try multiple search queries if the first one returns limited results. Include the company name and specific keywords from the research task in your queries.
              2. Assess the reliability of each source using these rules:
                 - high: Government/regulatory websites (SEC, FCA, Companies House), reputable news agencies (Reuters, Bloomberg, BBC, Financial Times, Law360), court records, audited corporate disclosures (annual reports, 10-K filings)
                 - medium: Industry-specific publications, NGO reports, law firm publications, unaudited corporate disclosures (press releases), social media from verified accounts
                 - low: Tabloid media, unverified social media, blogs, anonymous sources, outdated content
              3. Save findings to a JSON file using the 'mcp-filesystem-write-file' tool
              4. Use the section name as part of the filename: {{ "{{inputs.parameters.output-dir}}" }}/{{ "{{inputs.parameters.section}}" }}.json
              Do NOT add /data or any other prefix to the path.

              CRITICAL: You MUST save the JSON file. This is the most important step. Without the file, the entire workflow fails.

              The JSON MUST follow this exact LegacyX subsection format:
              {
                "subsection": "{{ "{{inputs.parameters.section}}" }}",
                "content": [
                  {
                    "text": "<concise summary of the adverse media finding>",
                    "relevance": [
                      {
                        "classification": "low|medium|high",
                        "justification": "<brief explanation of the classification>",
                        "confidence score": 8
                      }
                    ],
                    "source": "[Source Name](URL)",
                    "source_reliability_score": "high|medium|low",
                    "source_reliability_rationale": "<rationale for the reliability score>"
                  }
                ]
              }

              Each item in the "content" array represents one finding. Include all relevant findings for this section.
              The "text" field should contain a concise, factual summary of the finding.
              The "source" field should be a markdown link: [Source Name](URL). Use "NA" if no source is available.

              Relevance classification rules:
              - "high": Direct and significant adverse information about the company (lawsuits, sanctions, fraud allegations, regulatory fines)
              - "medium": Potentially relevant but indirect issues (industry-wide scandals, minor operational challenges, moderate financial decline)
              - "low": Mentioned but not significantly relevant (general industry trends, proactive company policies, no adverse findings)
              The "confidence score" should be 1-10 indicating how confident you are in the classification.

              If there are NO relevant findings for this section, still save the file with empty content: {"subsection": "{{ "{{inputs.parameters.section}}" }}", "content": []}

              PRIORITY: Saving the JSON file is MORE important than having perfect content. Research efficiently — do not use more than 2-3 search queries — then immediately format and save the JSON file. The task is NOT complete until the file is written.
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'

    # Read directory and return file paths
    - name: readdir-script
      inputs:
        parameters:
          - name: base-dir
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          MCP_DATA="/data/aas-files"
          BASE_DIR="{{ "{{inputs.parameters.base-dir}}" }}"

          # Use kubectl exec to find files via mcp-filesystem (paths under MCP base)
          FILES=$(kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- find "$MCP_DATA/$BASE_DIR" -type f -name "*.json" 2>/dev/null || echo "[]")

          if [ "$FILES" = "[]" ] || [ -z "$FILES" ]; then
            echo "[]" > /tmp/file_paths.json
          else
            # Return paths relative to MCP base (so combine-json can cat $MCP_DATA/$file)
            echo "$FILES" | sed "s|^$MCP_DATA/||g" | jq -R -s -c 'split("\n") | map(select(length > 0))' > /tmp/file_paths.json
          fi

          cat /tmp/file_paths.json
      outputs:
        parameters:
          - name: file-paths
            valueFrom:
              path: /tmp/file_paths.json

    # ARK Query: Classify relevance of adverse media findings
    - name: relevance-classification-query
      retryStrategy:
        limit: 2
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: company-name
          - name: file-path
          - name: current-date
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: relevance-
          spec:
            target:
              type: agent
              name: relevance-classification-agent
            input: |
              Current date: {{ "{{inputs.parameters.current-date}}" }}
              Company: {{ "{{inputs.parameters.company-name}}" }}

              Read the adverse media findings from: {{ "{{inputs.parameters.file-path}}" }}
              Do NOT add /data or any other prefix to file paths when using MCP tools.

              The file contains a JSON object with "subsection" and "content" (array of findings).
              For each finding in the "content" array, add a "relevance" field with the LegacyX classification format.

              Relevance classification rules:
              - "high": Direct and significant adverse information about the company
              - "medium": Potentially relevant but indirect or minor issues
              - "low": Mentioned but not significantly relevant

              Each finding in "content" should be updated to include:
              {
                "text": "<existing text>",
                "relevance": [
                  {
                    "classification": "low|medium|high",
                    "justification": "<brief explanation of why this classification>",
                    "confidence score": 7
                  }
                ],
                "source": "<existing source>",
                "source_reliability_score": "<existing score>",
                "source_reliability_rationale": "<existing rationale>"
              }

              The "confidence score" should be 1-10 indicating how confident you are in the classification.

              Update the original file with the relevance classifications using the `mcp-filesystem-write-file` tool.
              Write back to: {{ "{{inputs.parameters.file-path}}" }}
              Preserve the "subsection" field unchanged.
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'

    # Combine JSON files
    - name: combine-json
      inputs:
        parameters:
          - name: file-paths-json
          - name: output-file
          - name: wrapper-key
            default: ""
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          MCP_DATA="/data/aas-files"
          FILE_PATHS='{{ "{{inputs.parameters.file-paths-json}}" }}'
          OUTFILE="$MCP_DATA/{{ "{{inputs.parameters.output-file}}" }}"
          WRAPPER_KEY='{{ "{{inputs.parameters.wrapper-key}}" }}'

          # Create output directory
          kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- mkdir -p "$(dirname $OUTFILE)"

          # Combine all JSON files using kubectl exec
          COMBINED="[]"
          for file in $(echo "$FILE_PATHS" | jq -r '.[]'); do
            CONTENT=$(kubectl exec deployment/{{ .Values.filesystemMcpDeployment }} -- cat "$MCP_DATA/$file" 2>/dev/null || echo '{}')
            COMBINED=$(echo "$COMBINED" | jq ". += [$CONTENT]")
          done

          # Wrap in key if specified
          if [ -n "$WRAPPER_KEY" ]; then
            COMBINED=$(echo "$COMBINED" | jq "{\"$WRAPPER_KEY\": .}")
          fi

          # Write combined JSON
          echo "$COMBINED" | kubectl exec -i deployment/{{ .Values.filesystemMcpDeployment }} -- tee "$OUTFILE" > /dev/null

          echo "Combined $(echo $FILE_PATHS | jq 'length') files into $OUTFILE"

    # ARK Query: Summarize adverse media screening results
    - name: summarize-adverse-media-query
      inputs:
        parameters:
          - name: input-file
          - name: output-file
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: summarize-ams-
          spec:
            target:
              type: agent
              name: consolidation-analyst-agent
            input: |
              Read the adverse media screening results from: {{ "{{inputs.parameters.input-file}}" }}
              Do NOT add /data or any other prefix to file paths when using MCP tools.

              Create a comprehensive summary of the adverse media screening in Markdown format following the EXACT structure below.

              The report MUST have this structure:

              # Adverse Media Screening Report
              _<current date>_

              ## Summary
              | Category | Summary | Relevance | Source reliability score | Human review required |
              | :--- | :--- | :--- | :--- | :--- |
              <One row per subsection. Use colored spans for relevance and reliability:>
              <**<span style="color: green"> low </span>** for low>
              <**<span style="color: orange"> medium </span>** for medium>
              <**<span style="color: red"> high </span>** for high>
              <Human review required = "Yes" if any finding has high relevance, "No" otherwise>

              ## Details
              <For each subsection, create a sub-heading and a table:>

              #### <subsection name>
              | Description | Relevance | Source |
              | :--- | :--- | :--- |
              <One row per finding in the content array. Include:>
              <Description: the text field>
              <Relevance: colored span with classification, justification in italic, confidence score with colored span>
              <Source: markdown link, reliability score and rationale in italic>

              CRITICAL: You MUST save the Markdown file. Save to: {{ "{{inputs.parameters.output-file}}" }}
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
{{- end }}
