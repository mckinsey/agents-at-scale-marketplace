{{- if .Values.argoWorkflows.workflowTemplate.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lx-kyc-memo
  labels:
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    workflows.argoproj.io/title: "Phase III - KYC memo - 1. KYC memo"
    workflows.argoproj.io/description: "Generate final KYC memo from consolidated customer profile"
    workflows.argoproj.io/version: "v0.0.1"
    workflows.argoproj.io/migrated-from: "legacyx"
spec:
  entrypoint: main
  serviceAccountName: {{ .Release.Name }}-{{ .Values.argoWorkflows.serviceAccount.name }}

  arguments:
    parameters:
      - name: input-profile
        value: "source_code_files/3-kyc-memo/input/kyc_profile.json"
      - name: output-memo
        value: "source_code_files/3-kyc-memo/output/kyc_memo.md"
      - name: risk-rating
        value: "4"

  templates:
    - name: main
      inputs:
        parameters:
          - name: input-profile
          - name: output-memo
          - name: risk-rating
      steps:
        - - name: ensure-output-dir
            template: ensure-output-dir-script
            arguments:
              parameters:
                - name: output-memo
                  value: "{{ "{{inputs.parameters.output-memo}}" }}"
        - - name: generate-kyc-memo
            template: kyc-memo-query
            arguments:
              parameters:
                - name: input-profile
                  value: "{{ "{{inputs.parameters.input-profile}}" }}"
                - name: output-memo
                  value: "{{ "{{inputs.parameters.output-memo}}" }}"
                - name: risk-rating
                  value: "{{ "{{inputs.parameters.risk-rating}}" }}"

    - name: ensure-output-dir-script
      inputs:
        parameters:
          - name: output-memo
      script:
        image: alpine/k8s:1.28.13
        command: [bash]
        source: |
          MCP_DATA="/data/aas-files"
          OUTPUT_DIR=$(dirname "$MCP_DATA/{{ "{{inputs.parameters.output-memo}}" }}")
          kubectl exec deployment/mcp-filesystem -- mkdir -p "$OUTPUT_DIR"
          echo "Created directory: $OUTPUT_DIR"

    - name: kyc-memo-query
      retryStrategy:
        limit: 2
        retryPolicy: "Always"
      inputs:
        parameters:
          - name: input-profile
          - name: output-memo
          - name: risk-rating
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.mckinsey.com/v1alpha1
          kind: Query
          metadata:
            generateName: kyc-memo-
          spec:
            target:
              type: agent
              name: summary-assessment-agent
            serviceAccount: {{ .Release.Name }}-{{ .Values.argoWorkflows.serviceAccount.name }}
            timeout: 15m
            ttl: 24h
            input: |
              Read the full KYC profile from: {{ "{{inputs.parameters.input-profile}}" }}
              Do NOT add /data or any other prefix to file paths when using MCP tools.

              Generate a final KYC memo document suitable for compliance and relationship approval. Include:

              1. **Executive summary** – 2–3 sentences on the customer and recommended outcome.
              2. **Customer overview** – Name, jurisdiction, business nature, purpose of relationship.
              3. **Ownership and control** – Key beneficial owners and controllers; any notable structures.
              4. **Screening summary** – Adverse media, sanctions, and blacklist outcomes; material findings only.
              5. **Risk assessment** – Overall risk rating (use provided risk rating context: {{ "{{inputs.parameters.risk-rating}}" }}), key risk factors, and mitigants.
              6. **Recommendation** – Clear recommendation (e.g. approve, approve with conditions, escalate, decline) with brief rationale.
              7. **Date** – Include current date in the memo.

              Write in clear, professional language.

              IMPORTANT: You MUST use the `mcp-filesystem-write-file` tool to save the memo as Markdown to: {{ "{{inputs.parameters.output-memo}}" }}
              Do NOT add /data or any other prefix to the path.
              Do NOT just return the memo content in your response — you MUST write it to the file using the tool.
              After saving, confirm the file was written successfully by stating the file path.
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
{{- end }}
