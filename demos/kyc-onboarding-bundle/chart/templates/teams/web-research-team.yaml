{{- if .Values.teams.webResearchTeam.enabled }}
# ============================================================
# WEB RESEARCH TEAM - Online KYC Information Gathering
# ============================================================
# Researches entities online for KYC due diligence
# Translated from: legacyX web_research_squad / profile_web_enricher
# ============================================================

apiVersion: ark.mckinsey.com/v1alpha1
kind: Team
metadata:
  name: {{ .Values.teams.webResearchTeam.name }}
  labels:
    project: kyc-onboarding
    function: web-research
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  description: |
    Team that conducts comprehensive web research for KYC due diligence.
    Gathers business information, news, regulatory data, and reputation intelligence.
    
    Workflow:
    1. Planner creates research mission plan
    2. Researcher gathers information from online sources
    3. Analyst structures findings into required format
    4. Critic reviews quality and source credibility
    5. File Manager saves research results
  
  # Sequential strategy: Each agent completes before next starts
  strategy: {{ .Values.teams.webResearchTeam.strategy }}
  
  # Maximum conversation turns
  maxTurns: {{ .Values.teams.webResearchTeam.maxTurns }}
  
  # Team members in execution order
  members:
    - name: {{ .Values.agents.webPlanner.name }}
      type: agent
    
    - name: {{ .Values.agents.webResearcher.name }}
      type: agent
    
    - name: {{ .Values.agents.webAnalyst.name }}
      type: agent
    
    - name: {{ .Values.agents.critic.name }}
      type: agent
    
    - name: {{ .Values.agents.fileManager.name }}
      type: agent
{{- end }}
