{{- if .Values.teams.docExtractionTeam.enabled }}
# ============================================================
# DOCUMENT EXTRACTION TEAM - PDF Ownership Data Extraction
# ============================================================
# Extracts ownership and corporate structure information from PDFs
# Translated from: document extraction squad (information from document)
# ============================================================

apiVersion: ark.mckinsey.com/v1alpha1
kind: Team
metadata:
  name: {{ .Values.teams.docExtractionTeam.name }}
  labels:
    project: kyc-onboarding
    function: document-extraction
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  description: |
    Team that extracts requested information from documents (e.g. annual reports)
    and documents it in a structured format (information-from-document pattern).
    
    Objective (retrieve information from document):
    Retrieve information from document at {{ "{{file_path_rag}}" }}. Identify subsection and
    keywords from {{ "{{prompt}}" }}; use rag_lookup (query=keywords, top_k=15, file_name);
    assess relevance/sufficiency; improve keywords and retry up to five times if needed;
    formulate answer; ensure completeness (reuse tool with returned names for lists);
    format as JSON; save to {{ "{{file_path_output}}" }}/{{ "{{section}}" }}/<subsection>-{{ "{{document_type}}" }}.json.
    
    Workflow:
    1. Planner creates extraction mission plan
    2. RAG Agent extracts using rag_lookup
    3. Analyst structures extraction into required format
    4. Critic reviews quality and completeness
    5. File Manager saves final output
    
    Capabilities: Read prompt, extract from embedded document via rag_lookup, document in structured format, save as JSON.
  
  # Sequential strategy: Each agent completes before next starts
  strategy: {{ .Values.teams.docExtractionTeam.strategy }}
  
  # Enable loops with turn limit
  loops: true
  maxTurns: {{ .Values.teams.docExtractionTeam.maxTurns }}
  
  # Team members in execution order
  members:
    - name: {{ .Values.agents.docPlanner.name }}
      type: agent
    
    - name: {{ .Values.agents.ragAgent.name }}
      type: agent
    
    - name: {{ .Values.agents.docAnalyst.name }}
      type: agent
    
    - name: {{ .Values.agents.critic.name }}
      type: agent
    
    - name: {{ .Values.agents.fileManager.name }}
      type: agent
{{- end }}
