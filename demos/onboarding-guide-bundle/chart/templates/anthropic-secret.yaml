{{- if and .Values.anthropic.apiKey (not .Values.anthropic.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.anthropic.secretName }}
  labels:
    {{- include "onboarding.labels" . | nindent 4 }}
type: Opaque
stringData:
  apiKey: {{ .Values.anthropic.apiKey | quote }}
{{- end }}
