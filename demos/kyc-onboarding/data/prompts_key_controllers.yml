key_controllers:
  board_of_directors:
    objective: |
      Identify the active members of the board of directors and their specific roles, including whether they are executive, non-executive, or independent directors. Clearly list their names, titles, and any relevant details about their tenure or independence status.

      Definition: The board of directors is the governing body responsible for overseeing the company’s strategic direction and ensuring accountability to shareholders. It typically includes both executive and non-executive members.

      Example: "The board of directors of Company X includes:
      - Alice Johnson (Chairperson, independent, tenure: 7 years)
      - Robert Lee (Non-executive director, tenure: 4 years)
      - Sarah White (Executive director, tenure: 3 years)"

      Keywords: board composition, members of the board of directors, chairman, chief executive, finance director, executive director, non-executive director, independent director

  board_of_management:
    objective: |
      Identify the active members of the board of management and their specific roles within the company. Clearly list their names, titles, and any additional information related to their tenure or responsibilities. Make sure you do not include members of the board of directors in this section, as they are distinct from the board of management.

      Definition: The board of management refers to the group of individuals responsible for the day-to-day operations and execution of the company’s strategy. This typically includes key executives such as the CEO, CFO, COO, and others in similar leadership roles.

      Example: "The board of management of Company X includes:
      - John Smith (CEO, tenure: 5 years)
      - Jane Doe (CFO, tenure: 3 years)
      - Michael Brown (COO, tenure: 2 years)"

      Keywords: members of the board of management, members of the executive board, CEO, CFO, COO, chief financial officer, chief operating officer, management structure, key executives

      
