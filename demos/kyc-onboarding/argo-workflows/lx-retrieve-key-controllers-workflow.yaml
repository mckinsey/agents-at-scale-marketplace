apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: lx-retrieve-key-controllers
  annotations:
    workflows.argoproj.io/title: "Phase II - Customer Due Diligence - 1c. Key Controllers"
    workflows.argoproj.io/description: "Retrieve key controllers (Board of Directors and Management) from annual reports and web sources"
    workflows.argoproj.io/version: "v0.0.1"
    workflows.argoproj.io/migrated-from: "legacyx"
spec:
  entrypoint: main
  serviceAccountName: argo-workflow
  
  volumes:
    - name: mcp-filesystem-volume
      hostPath:
        path: /mnt/output
        type: DirectoryOrCreate
  
  arguments:
    parameters:
      - name: company-name
        value: "ASSOCIATED BRITISH FOODS PLC"
      - name: document-file
        value: "/mnt/output/data/pdfs/abf-annual-report-2024.pdf"
      - name: output-base-dir
        value: "source_code_files/2-customer-due-diligence"
      - name: execution-mode
        value: "sequential"
        enum:
          - sequential
          - parallel
  
  templates:
    # ============================================================
    # MAIN WORKFLOW
    # ============================================================
    - name: main
      steps:
        # Step 1: Get current date
        - - name: get-current-date
            template: get-current-date-script
        
        # Step 2: Get key controllers prompts from YAML
        - - name: get-key-controllers-prompts
            template: read-prompts-file
            arguments:
              parameters:
                - name: prompts-file-path
                  value: "{{workflow.parameters.output-base-dir}}/input/prompts_key_controllers.yml"
        
        # Step 3: Collect information from annual report (conditional execution)
        - - name: collect-info-sequential
            when: "{{workflow.parameters.execution-mode}} == sequential"
            template: collect-info-sequential
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{steps.get-key-controllers-prompts.outputs.parameters.prompts-list}}"
                - name: document-file
                  value: "{{workflow.parameters.document-file}}"
                - name: output-dir
                  value: "{{workflow.parameters.output-base-dir}}/intermediate/key_controllers"
                - name: current-date
                  value: "{{steps.get-current-date.outputs.parameters.current-date}}"
        
          - name: collect-info-parallel
            when: "{{workflow.parameters.execution-mode}} == parallel"
            template: collect-info-parallel
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{steps.get-key-controllers-prompts.outputs.parameters.prompts-list}}"
                - name: document-file
                  value: "{{workflow.parameters.document-file}}"
                - name: output-dir
                  value: "{{workflow.parameters.output-base-dir}}/intermediate/key_controllers"
                - name: current-date
                  value: "{{steps.get-current-date.outputs.parameters.current-date}}"
        
        # Step 4: Collect web data (conditional execution)
        - - name: collect-web-data-sequential
            when: "{{workflow.parameters.execution-mode}} == sequential"
            template: collect-web-data-sequential
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{steps.get-key-controllers-prompts.outputs.parameters.prompts-list}}"
                - name: company-name
                  value: "{{workflow.parameters.company-name}}"
                - name: output-dir
                  value: "{{workflow.parameters.output-base-dir}}/intermediate/key_controllers"
                - name: current-date
                  value: "{{steps.get-current-date.outputs.parameters.current-date}}"
        
          - name: collect-web-data-parallel
            when: "{{workflow.parameters.execution-mode}} == parallel"
            template: collect-web-data-parallel
            arguments:
              parameters:
                - name: prompts-json
                  value: "{{steps.get-key-controllers-prompts.outputs.parameters.prompts-list}}"
                - name: company-name
                  value: "{{workflow.parameters.company-name}}"
                - name: output-dir
                  value: "{{workflow.parameters.output-base-dir}}/intermediate/key_controllers"
                - name: current-date
                  value: "{{steps.get-current-date.outputs.parameters.current-date}}"
        
        # Step 5: Read JSON files from directory
        - - name: read-info-json-directory
            template: readdir-script
            arguments:
              parameters:
                - name: base-dir
                  value: "{{workflow.parameters.output-base-dir}}/intermediate/key_controllers"
        
        # Step 6: Combine JSON files
        - - name: append-info-files
            template: combine-json
            arguments:
              parameters:
                - name: file-paths-json
                  value: "{{steps.read-info-json-directory.outputs.parameters.file-paths}}"
                - name: output-file
                  value: "{{workflow.parameters.output-base-dir}}/intermediate/tmp/key_controllers_unconsolidated.json"
        
        # Step 7: Consolidate information
        - - name: consolidate-information
            template: consolidate-key-controllers-query
            arguments:
              parameters:
                - name: company-name
                  value: "{{workflow.parameters.company-name}}"
                - name: input-file
                  value: "{{workflow.parameters.output-base-dir}}/intermediate/tmp/key_controllers_unconsolidated.json"
                - name: profile-file
                  value: "{{workflow.parameters.output-base-dir}}/input/kyc_profile.json"
                - name: output-file
                  value: "{{workflow.parameters.output-base-dir}}/profile_sections/key_controllers.json"
    
    # ============================================================
    # UTILITY TEMPLATES
    # ============================================================
    
    # Get current date
    - name: get-current-date-script
      script:
        image: alpine:latest
        command: [sh]
        source: |
          date +%Y-%m-%d > /tmp/current_date.txt
          cat /tmp/current_date.txt
      outputs:
        parameters:
          - name: current-date
            valueFrom:
              path: /tmp/current_date.txt
    
    # Read prompts from YAML file
    - name: read-prompts-file
      inputs:
        parameters:
          - name: prompts-file-path
      script:
        image: alpine/k8s:1.28.13
        command: [sh]
        source: |
          PROMPTS_FILE="/mnt/output/{{inputs.parameters.prompts-file-path}}"
          
          # Use kubectl exec to read file via mcp-filesystem
          PROMPTS_JSON=$(kubectl exec deployment/mcp-filesystem -- cat "$PROMPTS_FILE" | yq eval -o=json '.')
          
          echo "$PROMPTS_JSON" > /tmp/prompts.json
          
      outputs:
        parameters:
          - name: prompts-list
            valueFrom:
              path: /tmp/prompts.json
    
    # Collect information sequentially
    - name: collect-info-sequential
      inputs:
        parameters:
          - name: prompts-json
          - name: document-file
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-prompt
            template: doc-extract-query
            arguments:
              parameters:
                - name: prompt
                  value: "{{item.prompt}}"
                - name: section
                  value: "{{item.section}}"
                - name: document-file
                  value: "{{inputs.parameters.document-file}}"
                - name: output-dir
                  value: "{{inputs.parameters.output-dir}}"
                - name: current-date
                  value: "{{inputs.parameters.current-date}}"
            withParam: "{{inputs.parameters.prompts-json}}"
    
    # Collect information in parallel
    - name: collect-info-parallel
      inputs:
        parameters:
          - name: prompts-json
          - name: document-file
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-all-prompts
            template: doc-extract-query
            arguments:
              parameters:
                - name: prompt
                  value: "{{item.prompt}}"
                - name: section
                  value: "{{item.section}}"
                - name: document-file
                  value: "{{inputs.parameters.document-file}}"
                - name: output-dir
                  value: "{{inputs.parameters.output-dir}}"
                - name: current-date
                  value: "{{inputs.parameters.current-date}}"
            withParam: "{{inputs.parameters.prompts-json}}"
    
    # Collect web data sequentially
    - name: collect-web-data-sequential
      inputs:
        parameters:
          - name: prompts-json
          - name: company-name
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-web-prompt
            template: web-data-query
            arguments:
              parameters:
                - name: prompt
                  value: "{{item.prompt}}"
                - name: section
                  value: "{{item.section}}"
                - name: company-name
                  value: "{{inputs.parameters.company-name}}"
                - name: output-dir
                  value: "{{inputs.parameters.output-dir}}"
                - name: current-date
                  value: "{{inputs.parameters.current-date}}"
            withParam: "{{inputs.parameters.prompts-json}}"
    
    # Collect web data in parallel
    - name: collect-web-data-parallel
      inputs:
        parameters:
          - name: prompts-json
          - name: company-name
          - name: output-dir
          - name: current-date
      steps:
        - - name: process-all-web-prompts
            template: web-data-query
            arguments:
              parameters:
                - name: prompt
                  value: "{{item.prompt}}"
                - name: section
                  value: "{{item.section}}"
                - name: company-name
                  value: "{{inputs.parameters.company-name}}"
                - name: output-dir
                  value: "{{inputs.parameters.output-dir}}"
                - name: current-date
                  value: "{{inputs.parameters.current-date}}"
            withParam: "{{inputs.parameters.prompts-json}}"
    
    # ARK Query: Extract information from document using RAG agent
    - name: doc-extract-query
      inputs:
        parameters:
          - name: prompt
          - name: section
          - name: document-file
          - name: output-dir
          - name: current-date
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.quantumblack.com/v1alpha1
          kind: Query
          metadata:
            generateName: doc-extract-
          spec:
            agent: rag-agent
            prompt: |
              Current date: {{inputs.parameters.current-date}}
              
              {{inputs.parameters.prompt}}
              
              Use the `analyze_pdf_ownership` tool to extract information from the PDF file at: {{inputs.parameters.document-file}}
              
              After extracting the information, save it to a JSON file using the `write-file` tool.
              
              Calculate the hash of the prompt using MD5 and use it as the filename: [hash].json
              Prompt hash: $(echo -n "{{inputs.parameters.prompt}}" | md5sum | cut -d' ' -f1)
              
              Save the output file to: /mnt/output/{{inputs.parameters.output-dir}}/[hash].json
              
              The JSON structure should follow this format:
              {
                "section": "{{inputs.parameters.section}}",
                "prompt": "{{inputs.parameters.prompt}}",
                "data": <extracted_information>,
                "sources": [<list_of_sources_with_page_numbers>]
              }
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
    
    # ARK Query: Collect web data using web enricher agent
    - name: web-data-query
      inputs:
        parameters:
          - name: prompt
          - name: section
          - name: company-name
          - name: output-dir
          - name: current-date
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.quantumblack.com/v1alpha1
          kind: Query
          metadata:
            generateName: web-data-
          spec:
            agent: profile-web-enricher
            prompt: |
              Current date: {{inputs.parameters.current-date}}
              Company: {{inputs.parameters.company-name}}
              
              {{inputs.parameters.prompt}}
              
              Use the `research-ubo-web` tool to research information about the company.
              
              After collecting the information, save it to a JSON file using the `write-file` tool.
              
              Calculate the hash of the prompt using MD5 and use it as the filename: web_[hash].json
              Prompt hash: $(echo -n "{{inputs.parameters.prompt}}" | md5sum | cut -d' ' -f1)
              
              Save the output file to: /mnt/output/{{inputs.parameters.output-dir}}/web_[hash].json
              
              The JSON structure should follow this format:
              {
                "section": "{{inputs.parameters.section}}",
                "prompt": "{{inputs.parameters.prompt}}",
                "company": "{{inputs.parameters.company-name}}",
                "data": <researched_information>,
                "sources": [<list_of_web_sources>]
              }
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
    
    # Read directory and return file paths
    - name: readdir-script
      inputs:
        parameters:
          - name: base-dir
      script:
        image: alpine/k8s:1.28.13
        command: [sh]
        source: |
          BASE_DIR="{{inputs.parameters.base-dir}}"
          
          # Use kubectl exec to find files via mcp-filesystem
          FILES=$(kubectl exec deployment/mcp-filesystem -- find "/mnt/output/$BASE_DIR" -type f -name "*.json" 2>/dev/null || echo "[]")
          
          if [ "$FILES" = "[]" ] || [ -z "$FILES" ]; then
            echo "[]" > /tmp/file_paths.json
          else
            # Convert to JSON array, removing /mnt/output/ prefix
            echo "$FILES" | sed 's|/mnt/output/||g' | jq -R -s -c 'split("\n") | map(select(length > 0))' > /tmp/file_paths.json
          fi
          
          cat /tmp/file_paths.json
      outputs:
        parameters:
          - name: file-paths
            valueFrom:
              path: /tmp/file_paths.json
    
    # Combine JSON files
    - name: combine-json
      inputs:
        parameters:
          - name: file-paths-json
          - name: output-file
      script:
        image: alpine/k8s:1.28.13
        command: [sh]
        source: |
          FILE_PATHS='{{inputs.parameters.file-paths-json}}'
          OUTFILE="/mnt/output/{{inputs.parameters.output-file}}"
          
          # Create output directory
          kubectl exec deployment/mcp-filesystem -- mkdir -p "$(dirname $OUTFILE)"
          
          # Combine all JSON files using kubectl exec
          COMBINED="[]"
          for file in $(echo "$FILE_PATHS" | jq -r '.[]'); do
            CONTENT=$(kubectl exec deployment/mcp-filesystem -- cat "/mnt/output/$file" 2>/dev/null || echo '{}')
            COMBINED=$(echo "$COMBINED" | jq ". += [$CONTENT]")
          done
          
          # Write combined JSON
          echo "$COMBINED" | kubectl exec -i deployment/mcp-filesystem -- tee "$OUTFILE" > /dev/null
          
          echo "Combined $(echo $FILE_PATHS | jq 'length') files into $OUTFILE"
    
    # ARK Query: Consolidate key controllers information
    - name: consolidate-key-controllers-query
      inputs:
        parameters:
          - name: company-name
          - name: input-file
          - name: profile-file
          - name: output-file
      resource:
        action: create
        successCondition: status.phase == done
        failureCondition: status.phase == error
        manifest: |
          apiVersion: ark.quantumblack.com/v1alpha1
          kind: Query
          metadata:
            generateName: consolidate-kc-
          spec:
            agent: consolidation-agent
            prompt: |
              Company: {{inputs.parameters.company-name}}
              
              Read the unconsolidated key controllers data from: /mnt/output/{{inputs.parameters.input-file}}
              Read the existing customer profile data from: /mnt/output/{{inputs.parameters.profile-file}}
              
              Goal: Consolidate different sources of output to determine the key controllers of the company. 
              The output should only contain the key controllers of the company, split into two subsections: 
              'Board of Directors' and 'Board of Management'.
              
              From the customer profile, extract information on key controllers (Directors, Managers, C-suite, executives).
              Do not use general information on the company, but only information on key controllers. 
              This information is very reliable and should be included.
              
              Consolidate all sources and create a comprehensive list of key controllers with:
              - Full names
              - Positions/titles
              - Board membership (Directors vs Management)
              - Any additional relevant details
              
              Save the consolidated result to: /mnt/output/{{inputs.parameters.output-file}}
              
              The JSON structure should be:
              {
                "Board of Directors": [
                  {
                    "name": "Person Name",
                    "position": "Chairman",
                    ...
                  }
                ],
                "Board of Management": [
                  {
                    "name": "Person Name",
                    "position": "CEO",
                    ...
                  }
                ]
              }
      outputs:
        parameters:
          - name: response
            valueFrom:
              jsonPath: '{.status.response.content}'
