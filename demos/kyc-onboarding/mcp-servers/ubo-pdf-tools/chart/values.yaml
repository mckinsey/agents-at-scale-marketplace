replicaCount: 1

image:
  repository: ubo-pdf-tools
  pullPolicy: Never  # For Docker Desktop - image is available locally
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false  # ChromaDB needs to write to disk
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 1000m
    memory: 2Gi
  requests:
    cpu: 250m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Environment variables for API keys and configuration
env:
  - name: OPENAI_API_KEY
    valueFrom:
      secretKeyRef:
        name: openai-credentials
        key: api-key
        optional: true
  - name: OPENAI_BASE_URL
    value: ""
  - name: ANTHROPIC_API_KEY
    valueFrom:
      secretKeyRef:
        name: anthropic-credentials
        key: api-key
        optional: true
  - name: ANTHROPIC_BASE_URL
    value: ""
  - name: FASTMCP_HOST
    value: "0.0.0.0"
  - name: FASTMCP_PORT
    value: "8080"

# MCP Server configuration
mcpServer:
  create: true
  name: "ubo-pdf-tools-server"
  description: "PDF-based UBO extraction and analysis tools"
  timeout: "300s"  # 5 minutes for long-running extractions
